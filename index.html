<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>S.H.LEE Ad Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#05080F;--card:rgba(255,255,255,0.025);--bd:rgba(255,255,255,0.06);--tx:#E2E8F0;--mt:#64748B;--ac:#3B82F6;--gn:#10B981;--rd:#EF4444;--or:#F59E0B;--pu:#8B5CF6}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;min-height:100vh;max-width:620px;margin:0 auto;padding:16px 14px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
button{font-family:inherit;cursor:pointer;border:none}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:10px;animation:fadeIn .3s}
.kpi .lb{font-size:9px;color:var(--mt);margin-bottom:2px}.kpi .vl{font-size:19px;font-weight:800;letter-spacing:-0.5px}.kpi .sb{font-size:8px;color:var(--mt);margin-top:1px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
.tabs{display:flex;gap:2px;margin:10px 0;overflow-x:auto;padding-bottom:4px}
.tab{padding:6px 8px;border-radius:7px;font-size:10px;font-weight:600;white-space:nowrap;background:transparent;color:var(--mt);transition:all .15s}.tab.active{background:rgba(59,130,246,0.15);color:var(--ac)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:2px}.dot.ok{background:var(--gn)}.dot.no{background:var(--mt)}
.refresh{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:var(--ac);padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:9px}th{padding:5px 4px;text-align:left;font-size:8px;color:var(--mt);font-weight:600;border-bottom:1px solid var(--bd)}td{padding:6px 4px;border-bottom:1px solid var(--bd)}
.section{display:none}.section.active{display:block}
.setup-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--tx);font-size:13px;font-family:inherit;outline:none;margin-bottom:12px}.setup-input:focus{border-color:var(--ac)}
.connect-btn{width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);color:#fff;font-size:14px;font-weight:700}.connect-btn:disabled{opacity:0.5}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
.chg{display:inline-block;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700}.chg.up{background:rgba(16,185,129,0.1);color:var(--gn)}.chg.down{background:rgba(239,68,68,0.1);color:var(--rd)}
.alert{padding:10px 12px;border-radius:8px;font-size:10px;line-height:1.6;margin-bottom:8px}
.alert.warn{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);color:var(--or)}
.alert.bad{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);color:var(--rd)}
.alert.good{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.15);color:var(--gn)}
.camp-card{padding:12px;border-radius:10px;border:1px solid var(--bd);margin-bottom:8px;cursor:pointer;transition:all .15s}.camp-card:hover{border-color:rgba(255,255,255,0.12)}
.fstep{padding:10px 12px;border-radius:10px;border:1px solid var(--bd);margin-bottom:6px;cursor:pointer;transition:all .15s}.fstep:hover{border-color:rgba(255,255,255,0.15)}
</style>
</head>
<body>
<div id="setup" style="display:none;max-width:440px;margin:60px auto;padding:0 20px;animation:fadeIn .5s">
  <div style="text-align:center;margin-bottom:24px">
    <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px">📊</div>
    <h1 style="font-size:22px;font-weight:800">S.H.LEE Ad Monitor</h1>
    <p style="color:var(--mt);font-size:13px;margin-top:4px">구글시트 URL을 입력하세요</p>
  </div>
  <input id="sheetInput" class="setup-input" placeholder="https://docs.google.com/spreadsheets/d/...">
  <button id="connectBtn" class="connect-btn" onclick="handleConnect()">구글시트 연결</button>
</div>
<div id="dashboard" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:13px">📊</div>
      <div><div style="font-size:16px;font-weight:800">S.H.LEE Ad Monitor</div><div id="statusDots" style="font-size:8px;color:var(--mt)"></div></div>
    </div>
    <button class="refresh" onclick="handleRefresh()" id="refreshBtn">🔄 동기화</button>
  </div>
  <div id="lastSyncText" style="font-size:8px;color:var(--mt);text-align:right;margin-bottom:4px"></div>
  <div class="tabs" id="tabBar"></div>
  <div id="sec-funnel" class="section"></div>
  <div id="sec-ads" class="section"></div>
  <div id="sec-product" class="section"></div>
  <div id="sec-crosssell" class="section"></div>
  <div id="sec-ai" class="section"></div>
  <div id="sec-settings" class="section"></div>
</div>
<script>
// ═══ JSONP ═══
function loadSheet(id,tab){return new Promise(res=>{const cb='_c'+Math.random().toString(36).substr(2,8);const s=document.createElement('script');let d=false;
window[cb]=function(r){d=true;delete window[cb];if(s.parentNode)s.remove();res(r&&r.status==='ok'&&r.table?gviz(r.table):null)};
s.src=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(tab)}`;
s.onerror=()=>{if(!d){d=true;delete window[cb];res(null)}};setTimeout(()=>{if(!d){d=true;delete window[cb];if(s.parentNode)s.remove();res(null)}},12000);document.head.appendChild(s)})}
function gviz(t){if(!t||!t.cols||!t.rows)return[];const h=t.cols.map(c=>(c.label||c.id||'').trim());
return t.rows.map(row=>{const o={};(row.c||[]).forEach((c,i)=>{if(i<h.length)o[h[i]]=c?(c.v!=null?String(c.v):''):''});return o}).filter(o=>Object.values(o).some(v=>v!==''))}

// ═══ STATE ═══
let S={sheetId:"",camp:[],tgt:[],st:[],br:[],pp:[],sync:{campaign:false,targeting:false,search_terms:false,business_report:false,purchased_product:false},lastSync:"",tab:"funnel"};
const LS={set(k,v){try{localStorage.setItem("sh_"+k,JSON.stringify(v))}catch(e){}},get(k,d){try{const v=localStorage.getItem("sh_"+k);return v?JSON.parse(v):d}catch(e){return d}},clear(){Object.keys(localStorage).filter(k=>k.startsWith("sh_")).forEach(k=>localStorage.removeItem(k))}};
const pn=s=>{const n=parseFloat(String(s||0).replace(/[,$%]/g,""));return isNaN(n)?0:n};
const sm=a=>a.reduce((x,y)=>x+y,0);const av=a=>a.length?sm(a)/a.length:0;
function fixD(d){const m=String(d).match(/Date\((\d+),(\d+),(\d+)\)/);return m?`${m[1]}-${String(+m[2]+1).padStart(2,'0')}-${m[3].padStart(2,'0')}`:String(d).slice(0,10)}
function pnPct(s){let v=pn(s);if(v>0&&v<=1)v=v*100;return v}

// ═══ PARSERS ═══
function parseCamp(rows){return rows.map(r=>({date:fixD(r["Date"]||""),purpose:r["Purpose"]||"",name:r["Campaign name"]||r["Campaign Name"]||"",
  status:r["Status"]||"",type:r["Type"]||"",budget:r["Campaign budget amount"]||r["Campaign budget amount (converted)"]||"",
  acos:pn(r["ACOS"]),roas:pn(r["ROAS"]),purchases:pn(r["Purchases"]),sales:pn(r["Sales"]||r["Sales (converted)"]),
  imp:pn(r["Impressions"]),clk:pn(r["Clicks"]),ctr:pn(r["CTR"]),cost:pn(r["Total cost"]||r["Total cost (converted)"]),
  tos:r["Top-of-search impression share"]||""})).filter(r=>r.name)}
function parseTgt(rows){return rows.map(r=>({date:fixD(r["Date"]||""),camp:r["Campaign Name"]||"",kw:r["Targeting"]||"",mt:r["Match Type"]||"",
  imp:pn(r["Impressions"]),clk:pn(r["Clicks"]),spend:pn(r["Spend"]),acos:pn(r["Total Advertising Cost of Sales (ACOS) "]),
  sales:pn(r["7 Day Total Sales "]),orders:pn(r["7 Day Total Orders (#)"]),
  advSales:pn(r["7 Day Advertised SKU Sales "]),otherSales:pn(r["7 Day Other SKU Sales "])})).filter(r=>r.kw)}
function parseST(rows){return rows.map(r=>({date:fixD(r["Date"]||""),camp:r["Campaign Name"]||"",kw:r["Targeting"]||"",mt:r["Match Type"]||"",
  query:r["Customer Search Term"]||"",imp:pn(r["Impressions"]),clk:pn(r["Clicks"]),spend:pn(r["Spend"]),
  sales:pn(r["7 Day Total Sales "]),orders:pn(r["7 Day Total Orders (#)"])})).filter(r=>r.query)}
function parseBR(rows){return rows.map(r=>({date:fixD(r["Date"]||""),asin:r["(Child) ASIN"]||"",title:r["Title"]||"",
  sessions:pn(r["Sessions - Total"]),pv:pn(r["Page Views - Total"]),units:pn(r["Units Ordered"]),
  cvr:pnPct(r["Unit Session Percentage"]),sales:pn(r["Ordered Product Sales"])})).filter(r=>r.asin)}
function parsePP(rows){return rows.map(r=>({date:fixD(r["날짜"]||r["Date"]||""),camp:r["캠페인 이름"]||r["Campaign Name"]||"",
  advAsin:r["광고된 ASIN"]||r["Advertised ASIN"]||"",kw:r["키워드"]||r["Keyword"]||"",
  purAsin:r["구매한 ASIN"]||r["Purchased ASIN"]||"",
  otherQty:pn(r["7일 기타 SKU 수량(개수)"]||0),otherOrders:pn(r["7일 기타 SKU 주문(건수)"]||0),
  otherSales:pn(r["7일 기타 SKU 판매 "]||0)})).filter(r=>r.advAsin||r.purAsin)}

// ═══ ANALYSIS ═══
function campByDate(data){const by={};data.forEach(r=>{if(!r.date)return;if(!by[r.date])by[r.date]={date:r.date,cost:0,sales:0,imp:0,clk:0,pur:0};
  by[r.date].cost+=r.cost;by[r.date].sales+=r.sales;by[r.date].imp+=r.imp;by[r.date].clk+=r.clk;by[r.date].pur+=r.purchases});
  return Object.values(by).sort((a,b)=>a.date.localeCompare(b.date))}
function kwTotals(data){const by={};data.forEach(r=>{const k=r.kw+"|"+r.camp;if(!by[k])by[k]={kw:r.kw,camp:r.camp,mt:r.mt,imp:0,clk:0,spend:0,sales:0,orders:0};
  by[k].imp+=r.imp;by[k].clk+=r.clk;by[k].spend+=r.spend;by[k].sales+=r.sales;by[k].orders+=r.orders});
  return Object.values(by).map(k=>({...k,acos:k.sales>0?(k.spend/k.sales*100):0})).sort((a,b)=>b.sales-a.sales)}
function crossSellAnalysis(data){const p={};data.forEach(r=>{if(!r.advAsin||!r.purAsin)return;const k=r.advAsin+"→"+r.purAsin;
  if(!p[k])p[k]={advAsin:r.advAsin,purAsin:r.purAsin,kws:new Set(),qty:0,orders:0,sales:0};
  if(r.kw)p[k].kws.add(r.kw);p[k].qty+=r.otherQty;p[k].orders+=r.otherOrders;p[k].sales+=r.otherSales});
  return Object.values(p).filter(x=>x.orders>0||x.qty>0).sort((a,b)=>b.orders-a.orders)}
function asinTraffic(data){const by={};data.forEach(r=>{if(!by[r.asin])by[r.asin]={asin:r.asin,title:r.title,sess:0,pv:0,units:0,sales:0,cvrs:[]};
  by[r.asin].sess+=r.sessions;by[r.asin].pv+=r.pv;by[r.asin].units+=r.units;by[r.asin].sales+=r.sales;if(r.cvr>0)by[r.asin].cvrs.push(r.cvr)});
  return Object.values(by).map(a=>({...a,cvr:av(a.cvrs)})).sort((a,b)=>b.sess-a.sess)}
function chgB(v,inv){const val=inv?v*-1:v;if(Math.abs(val)<0.5)return'';return`<span class="chg ${val>0?"up":"down"}">${val>0?"+":""}${val.toFixed(1)}%</span>`}
function pctCh(c,p){return p>0?((c-p)/p*100):0}

// ═══ SYNC ═══
async function syncAll(id){const sync={campaign:false,targeting:false,search_terms:false,business_report:false,purchased_product:false};
  const c=await loadSheet(id,"campaign");if(c&&c.length){S.camp=parseCamp(c);LS.set("c",S.camp);sync.campaign=true}
  const t=await loadSheet(id,"targeting");if(t&&t.length){S.tgt=parseTgt(t);LS.set("t",S.tgt);sync.targeting=true}
  const s=await loadSheet(id,"search_terms");if(s&&s.length){S.st=parseST(s);LS.set("s",S.st);sync.search_terms=true}
  const b=await loadSheet(id,"business_report");if(b&&b.length){S.br=parseBR(b);LS.set("b",S.br);sync.business_report=true}
  const p=await loadSheet(id,"purchased_product");if(p&&p.length){S.pp=parsePP(p);LS.set("p",S.pp);sync.purchased_product=true}
  S.sync=sync;S.lastSync=new Date().toLocaleString("ko-KR");LS.set("sync",sync);LS.set("last",S.lastSync);return sync}
async function handleConnect(){const url=document.getElementById("sheetInput").value;const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(!m){alert("URL을 정확히 붙여넣어 주세요.");return}const btn=document.getElementById("connectBtn");
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>연결 중...';S.sheetId=m[1];LS.set("id",S.sheetId);
  await syncAll(S.sheetId);btn.disabled=false;btn.textContent="구글시트 연결";showDashboard()}
async function handleRefresh(){const btn=document.getElementById("refreshBtn");
  btn.innerHTML='<span class="spinner" style="width:10px;height:10px;border-width:1.5px"></span>';
  await syncAll(S.sheetId);btn.textContent="🔄 동기화";renderHeader();renderTab()}

// ═══ RENDER CORE ═══
let charts={};function dc(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={}}
const PURPOSE_L={launch:{l:"🚀런칭",c:"#8B5CF6"},bestseller:{l:"👑베셀",c:"#F59E0B"},clearance:{l:"🏷️정리",c:"#EC4899"},conquest:{l:"🎯공략",c:"#06B6D4"},seasonal:{l:"📅시즌",c:"#F97316"},defense:{l:"🛡️방어",c:"#3B82F6"}};
function renderHeader(){const s=S.sync;document.getElementById("statusDots").innerHTML=
  `<span class="dot ${s.campaign?"ok":"no"}"></span>캠페인 <span class="dot ${s.targeting?"ok":"no"}"></span>키워드 <span class="dot ${s.search_terms?"ok":"no"}"></span>검색어 <span class="dot ${s.business_report?"ok":"no"}"></span>트래픽 <span class="dot ${s.purchased_product?"ok":"no"}"></span>크로스셀`;
  document.getElementById("lastSyncText").textContent=S.lastSync?"마지막: "+S.lastSync:""}
function renderTabs(){const bar=document.getElementById("tabBar");bar.innerHTML="";
  [["funnel","🔬 퍼널"],["ads","📈 노출&클릭"],["product","👥 상품"],["crosssell","🔀 크로스셀"],["ai","🤖 AI"],["settings","⚙️"]].forEach(([id,l])=>{
  const b=document.createElement("button");b.className="tab"+(S.tab===id?" active":"");b.textContent=l;
  b.onclick=()=>{S.tab=id;renderTabs();renderTab()};bar.appendChild(b)})}
function renderTab(){dc();document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  const el=document.getElementById("sec-"+S.tab);if(!el)return;el.classList.add("active");el.innerHTML="";
  ({funnel:rFunnel,ads:rAds,product:rProduct,crosssell:rCrossSell,ai:rAi,settings:rSettings})[S.tab]?.(el)}
function kpi(l,v,sub,c){return`<div class="card kpi"><div class="lb">${l}</div><div class="vl" style="color:${c}">${v}</div>${sub?`<div class="sb">${sub}</div>`:""}</div>`}
function empty(i,t,d){return`<div class="card" style="text-align:center;padding:28px"><div style="font-size:24px;margin-bottom:8px">${i}</div><div style="font-size:12px;font-weight:700;margin-bottom:6px">${t}</div><div style="font-size:10px;color:var(--mt);line-height:1.6">${d}</div></div>`}

// ══════════════════════════════════════
// TAB 1: 🔬 퍼널 진단 (5-stage)
// ══════════════════════════════════════
function rFunnel(el){
  if(!S.camp.length&&!S.br.length){el.innerHTML=empty("🔬","퍼널 진단","데이터를 넣고 🔄 동기화");return}
  const daily=campByDate(S.camp);const latest=daily.length?daily[daily.length-1]:null;const prev=daily.length>1?daily[daily.length-2]:null;
  const tCost=sm(S.camp.map(r=>r.cost)),tSales=sm(S.camp.map(r=>r.sales)),tImp=sm(S.camp.map(r=>r.imp)),tClk=sm(S.camp.map(r=>r.clk)),tPur=sm(S.camp.map(r=>r.purchases));
  const ctr=tImp>0?(tClk/tImp*100):0;const acos=tSales>0?(tCost/tSales*100):0;const roas=tCost>0?(tSales/tCost):0;
  const avgCVR=av(S.br.filter(r=>r.cvr>0).map(r=>r.cvr));
  const budgetC=S.camp.filter(r=>r.date===(daily.length?daily[daily.length-1].date:"")&&r.status.includes("BUDGET")).length;
  const wasteKW=S.st.filter(s=>s.spend>0&&s.sales===0);const wasteSpend=sm(wasteKW.map(s=>s.spend));
  const lowCVR=asinTraffic(S.br).filter(a=>a.cvr>0&&a.cvr<5);
  const cross=crossSellAnalysis(S.pp);
  let html="";

  // Day-over-day
  if(latest&&prev){html+=`<div class="card"><div style="font-size:11px;font-weight:700;margin-bottom:8px">전일 대비 (${latest.date})</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:10px">
    <div>매출 $${latest.sales.toFixed(0)} ${chgB(pctCh(latest.sales,prev.sales))}</div>
    <div>광고비 $${latest.cost.toFixed(0)} ${chgB(pctCh(latest.cost,prev.cost))}</div>
    <div>구매 ${latest.pur}건 ${chgB(pctCh(latest.pur,prev.pur))}</div></div></div>`}

  // Alerts
  if(budgetC>0)html+=`<div class="alert warn">⚠ ${budgetC}개 캠페인 예산 소진 → 전환 높은 시간대 매출 놓치는 중</div>`;
  if(wasteKW.length>10)html+=`<div class="alert bad">🚨 검색어 ${wasteKW.length}개가 $${wasteSpend.toFixed(0)} 낭비 → 네거티브 키워드 추가 필요</div>`;
  if(lowCVR.length>0)html+=`<div class="alert warn">⚠ ${lowCVR.length}개 ASIN CVR 5% 미만 → 상품 페이지 점검</div>`;
  if(cross.length>5)html+=`<div class="alert good">💡 크로스셀 ${cross.length}건 발견 → 번들/연관 광고 기회</div>`;
  if(!budgetC&&!wasteKW.length&&!lowCVR.length&&S.camp.length)html+=`<div class="alert good">✅ 심각한 이상 없음</div>`;

  // 5-stage funnel
  html+=`<div style="font-size:12px;font-weight:700;margin:12px 0 8px">5단계 퍼널</div>`;
  const stages=[
    {n:1,icon:"👁",t:"노출",q:"고객이 광고를 보는가?",v:tImp?tImp.toLocaleString():"—",
      detail:budgetC>0?budgetC+"개 예산소진":"정상",stat:budgetC>0?"warn":"ok",c:"#3B82F6",tab:"ads"},
    {n:2,icon:"👆",t:"CTR (클릭률)",q:"광고를 클릭하는가?",v:ctr?ctr.toFixed(2)+"%":"—",
      detail:ctr>0&&ctr<0.3?"CTR 낮음":ctr>=0.3?"양호":"데이터 필요",stat:ctr>0&&ctr<0.3?"warn":"ok",c:"#8B5CF6",tab:"ads"},
    {n:3,icon:"📄",t:"CVR (전환율)",q:"방문자가 구매하는가?",v:avgCVR?avgCVR.toFixed(1)+"%":"—",
      detail:avgCVR>0&&avgCVR<5?"리스팅 점검 필요":avgCVR>=5?"양호":"데이터 필요",stat:avgCVR>0&&avgCVR<5?"warn":"ok",c:"#F59E0B",tab:"product"},

    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,
      messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    if(d.error)aiState.result="API 오류: "+(d.error.message||JSON.stringify(d.error));
    else aiState.result=d.content?.map(c=>c.text||"").join("")||"실패";
  }catch(e){aiState.result="오류: "+e.message}
  aiState.loading=false;LS.set("aiR",aiState.result);LS.set("aiM",aiState.mode);rAi(document.getElementById("sec-ai"));
}

function getSelectedCamps(){
  if(!aiState.selCamps||!aiState.selCamps.length)return S.camp;
  return S.camp.filter(r=>aiState.selCamps.includes(r.name));
}

function buildAiPrompt(){
  const filtered=getSelectedCamps();
  const latestDate=[...new Set(filtered.map(r=>r.date))].sort().pop()||"";
  const camps=filtered.filter(c=>c.date===latestDate);
  const selNames=new Set(camps.map(c=>c.name));
  const kws=kwTotals(S.tgt.filter(t=>selNames.has(t.camp)));
  const sts=S.st.filter(s=>selNames.has(s.camp));
  const stByQ={};sts.forEach(s=>{if(!stByQ[s.query])stByQ[s.query]={q:s.query,spend:0,sales:0,clk:0};stByQ[s.query].spend+=s.spend;stByQ[s.query].sales+=s.sales;stByQ[s.query].clk+=s.clk});
  const stWaste=Object.values(stByQ).filter(s=>s.spend>0&&s.sales===0).sort((a,b)=>b.spend-a.spend).slice(0,10);
  const pairs=crossSellAnalysis(S.pp.filter(p=>selNames.has(p.camp)));
  const ctx={
    selectedCampaigns:camps.map(c=>({name:c.name,purpose:c.purpose||"미지정",sales:+c.sales.toFixed(0),cost:+c.cost.toFixed(0),acos:(c.acos*100).toFixed(0)+"%",imp:c.imp,clk:c.clk})),
    keywords:kws.slice(0,15).map(k=>({kw:k.kw,camp:k.camp,spend:+k.spend.toFixed(1),sales:+k.sales.toFixed(0),acos:k.acos.toFixed(0)+"%"})),
    wasteKeywords:kws.filter(k=>k.clk>=3&&k.sales===0).slice(0,10).map(k=>({kw:k.kw,camp:k.camp,clk:k.clk,spend:+k.spend.toFixed(1)})),
    wasteSearchTerms:stWaste.map(s=>({query:s.q,clicks:s.clk,spend:+s.spend.toFixed(2)})),
    crossSell:pairs.slice(0,8).map(p=>({adv:p.advAsin,pur:p.purAsin,orders:p.orders})),
    avgCVR:S.br.length?av(S.br.filter(r=>r.cvr>0).map(r=>r.cvr)).toFixed(1)+"%":"N/A"};
  return AI_MODES[aiState.mode].l+" 관점.\n"+AI_PROMPT+"\n\n데이터:\n"+JSON.stringify(ctx,null,1);
}

function copyPrompt(){
  if(!S.camp.length){alert("데이터가 없습니다. 먼저 동기화하세요.");return}
  const prompt=buildAiPrompt();
  // Show textarea with prompt for manual copy
  const box=document.getElementById("promptBox");
  if(box){
    box.style.display=box.style.display==="none"?"block":"none";
    box.querySelector("textarea").value=prompt;
    box.querySelector("textarea").select();
    // Also try clipboard API
    try{navigator.clipboard.writeText(prompt);
      const btn=document.getElementById("copyBtn");
      if(btn){btn.textContent="✅ 복사됨! Claude.ai에 붙여넣기";
        setTimeout(()=>{btn.textContent="📋 프롬프트 복사 (Claude.ai용)"},3000)}
    }catch(e){}
  }
}

function toggleCamp(name){
  if(!aiState.selCamps)aiState.selCamps=[];
  const idx=aiState.selCamps.indexOf(name);
  if(idx>=0)aiState.selCamps.splice(idx,1);else aiState.selCamps.push(name);
  rAi(document.getElementById("sec-ai"));
}

function rAi(el){if(!el)return;
  const hasKey=!!LS.get("apiKey","");
  if(!aiState.selCamps)aiState.selCamps=[];

  // Get active campaigns
  const dates=[...new Set(S.camp.map(r=>r.date))].sort();
  const latestDate=dates.length?dates[dates.length-1]:"";
  const activeCamps=S.camp.filter(r=>r.date===latestDate&&(r.status.includes("ENABLED")||r.status.includes("BUDGET")));
  const campNames=[...new Set(activeCamps.map(c=>c.name))];

  // Auto-select all if none selected
  if(aiState.selCamps.length===0&&campNames.length)aiState.selCamps=[...campNames];

  let html=`<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:8px">전략 유형</div>
    <div style="display:flex;flex-wrap:wrap;gap:4px">`;
  Object.entries(AI_MODES).forEach(([k,m])=>{const sel=aiState.mode===k;
    html+=`<button onclick="aiState.mode='${k}';rAi(document.getElementById('sec-ai'))" style="padding:5px 10px;border-radius:6px;border:2px solid ${sel?m.c:"var(--bd)"};background:${sel?m.c+"15":"transparent"};color:${sel?m.c:"var(--mt)"};font-size:10px;font-weight:600">${m.l}</button>`});
  html+=`</div></div>`;

  // Campaign selector
  if(campNames.length){
    html+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <div style="font-size:12px;font-weight:700">분석할 캠페인 선택</div>
      <div style="font-size:9px">
        <span onclick="aiState.selCamps=[...document.querySelectorAll('.ai-camp')].map(e=>e.dataset.name);rAi(document.getElementById('sec-ai'))" style="cursor:pointer;color:var(--ac);margin-right:8px">전체 선택</span>
        <span onclick="aiState.selCamps=[];rAi(document.getElementById('sec-ai'))" style="cursor:pointer;color:var(--mt)">전체 해제</span>
      </div></div>`;
    campNames.forEach(name=>{
      const sel=aiState.selCamps.includes(name);
      const c=activeCamps.find(x=>x.name===name);
      const p=c&&c.purpose&&PURPOSE_L[c.purpose.toLowerCase()]?PURPOSE_L[c.purpose.toLowerCase()]:null;
      html+=`<div class="ai-camp" data-name="${name}" onclick="toggleCamp('${name.replace(/'/g,"\\'")}')" 
        style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--bd);cursor:pointer;font-size:10px">
        <div style="width:16px;height:16px;border-radius:4px;border:2px solid ${sel?"#3B82F6":"var(--bd)"};background:${sel?"#3B82F6":"transparent"};display:flex;align-items:center;justify-content:center;flex-shrink:0">
          ${sel?'<span style="color:#fff;font-size:10px;line-height:1">✓</span>':""}</div>
        <div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:${sel?600:400}">${name}</div>
        ${p?`<span style="color:${p.c};font-size:8px;font-weight:600">${p.l}</span>`:""}
        <span style="color:var(--mt);font-size:9px">$${c?c.sales.toFixed(0):"0"}</span>
      </div>`;
    });
    html+=`<div style="margin-top:6px;font-size:9px;color:var(--ac);font-weight:600">${aiState.selCamps.length}개 선택됨</div></div>`;
  }

  const m=AI_MODES[aiState.mode];
  const canRun=S.camp.length>0&&aiState.selCamps.length>0;

  // Buttons
  html+=`<div class="card">`;
  if(hasKey){
    html+=`<button onclick="runAi()" ${!canRun||aiState.loading?"disabled":""} style="width:100%;padding:12px;border-radius:10px;border:none;
      background:linear-gradient(135deg,${m.c},${m.c}99);color:#fff;font-size:13px;font-weight:700;opacity:${canRun?1:.5};margin-bottom:8px">
      ${aiState.loading?'<span class="spinner"></span>분석 중...':'🤖 '+m.l+' AI 분석 실행 ('+aiState.selCamps.length+'개 캠페인)'}</button>`;
  }
  html+=`<button id="copyBtn" onclick="copyPrompt()" ${!canRun?"disabled":""} style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--bd);
    background:rgba(255,255,255,0.06);color:var(--tx);font-size:13px;font-weight:700;opacity:${canRun?1:.5}">
    📋 프롬프트 복사 (Claude.ai용)</button>`;
  // Prompt textarea (hidden by default, shown on copy click)
  html+=`<div id="promptBox" style="display:none;margin-top:8px">
    <div style="font-size:9px;color:var(--mt);margin-bottom:4px">아래 텍스트를 전체 선택(Ctrl+A) → 복사(Ctrl+C) → <a href="https://claude.ai" target="_blank" style="color:#3B82F6">claude.ai</a>에 붙여넣기</div>
    <textarea readonly style="width:100%;height:180px;background:#1E293B;color:#CBD5E1;border:1px solid var(--bd);border-radius:8px;padding:10px;font-size:9px;font-family:monospace;resize:vertical" onclick="this.select()"></textarea></div>`;
  if(!hasKey)html+=`<div style="margin-top:8px;font-size:9px;color:var(--mt);line-height:1.6">💡 <b>API Key 없이:</b> 프롬프트 복사 → <a href="https://claude.ai" target="_blank" style="color:#3B82F6">claude.ai</a>에 붙여넣기<br>
    🔑 <b>자동 분석:</b> ⚙️ 설정 → API Key 입력 (<a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:#3B82F6">발급</a>, 신규 $5 무료)</div>`;
  html+=`</div>`;

  if(aiState.result)html+=`<div class="card" style="border-color:${m.c}20"><div style="font-size:12px;font-weight:700;color:${m.c};margin-bottom:8px">${m.l} 결과</div>
    <div style="font-size:11px;color:#CBD5E1;line-height:1.8;white-space:pre-wrap">${aiState.result}</div></div>`;
  el.innerHTML=html;
}

function rSettings(el){
  const apiKey=LS.get("apiKey","");
  let html=`<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:6px">연결 상태</div>
    <div style="font-size:10px;color:#64748B;margin-bottom:8px;word-break:break-all">ID: ${S.sheetId}</div>`;
  [{n:"campaign",ok:S.sync.campaign,cnt:S.camp.length,f:"매일"},{n:"targeting",ok:S.sync.targeting,cnt:S.tgt.length,f:"주간"},
   {n:"search_terms",ok:S.sync.search_terms,cnt:S.st.length,f:"주간"},{n:"business_report",ok:S.sync.business_report,cnt:S.br.length,f:"매일"},
   {n:"purchased_product",ok:S.sync.purchased_product,cnt:S.pp.length,f:"주간"}].forEach(s=>{
    html+=`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:10px">
      <div><b>${s.n}</b> <span style="color:var(--mt)">${s.ok?s.cnt+"행":"없음"}</span></div>
      <div><span style="font-size:8px;color:${s.f==="매일"?"#EF4444":"#F59E0B"};margin-right:4px">${s.f}</span><span class="dot ${s.ok?"ok":"no"}"></span></div></div>`});
  html+=`</div>`;

  // API Key
  html+=`<div class="card" style="border-color:rgba(139,92,246,0.15)">
    <div style="font-size:11px;font-weight:700;color:#8B5CF6;margin-bottom:6px">🤖 AI 분석 API Key</div>
    <div style="font-size:9px;color:var(--mt);margin-bottom:8px">Anthropic API Key를 입력하면 🤖 AI 탭에서 전략 분석을 실행할 수 있습니다.<br>
    <a href="https://console.anthropic.com/settings/keys" target="_blank" style="color:#3B82F6">console.anthropic.com</a>에서 발급받으세요.</div>
    <input id="apiKeyInput" type="password" placeholder="sk-ant-api..." value="${apiKey}"
      style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--bd);background:rgba(255,255,255,0.04);color:var(--tx);font-size:11px;font-family:monospace;outline:none;margin-bottom:8px">
    <button onclick="LS.set('apiKey',document.getElementById('apiKeyInput').value);alert('저장됨')" style="padding:8px 16px;border-radius:8px;background:rgba(139,92,246,0.15);color:#8B5CF6;font-size:11px;font-weight:600">저장</button>
    ${apiKey?`<span style="margin-left:8px;font-size:9px;color:#10B981">✓ 저장됨</span>`:""}</div>`;

  // Purpose guide
  html+=`<div class="card"><div style="font-size:11px;font-weight:700;color:#F59E0B;margin-bottom:6px">🎯 Purpose 값</div>
    <div style="font-size:10px;color:var(--mt)">campaign 탭 B열: launch / bestseller / clearance / conquest / seasonal / defense</div></div>`;

  el.innerHTML=html;
  const btn=document.createElement("button");btn.textContent="🔌 연결 해제";
  btn.style.cssText="padding:10px;width:100%;border-radius:8px;border:1px solid rgba(239,68,68,0.2);background:transparent;color:#EF4444;font-size:11px;font-weight:600;cursor:pointer;margin-top:8px";
  btn.onclick=()=>{LS.clear();location.reload()};el.appendChild(btn);
}

function showDashboard(){document.getElementById("setup").style.display="none";document.getElementById("dashboard").style.display="block";renderHeader();renderTabs();renderTab()}
(function(){
  aiState.result=LS.get("aiR","");aiState.mode=LS.get("aiM","all");
  const id=LS.get("id","");
  if(id){S.sheetId=id;S.camp=LS.get("c",[]);S.tgt=LS.get("t",[]);S.st=LS.get("s",[]);S.br=LS.get("b",[]);S.pp=LS.get("p",[]);
    S.sync=LS.get("sync",S.sync);S.lastSync=LS.get("last","");showDashboard();
    syncAll(id).then(()=>{renderHeader();renderTab()})}
  else{document.getElementById("setup").style.display="block"}
})();
</script>
