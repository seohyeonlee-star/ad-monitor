<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>S.H.LEE Ad Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#05080F;--card:rgba(255,255,255,0.025);--bd:rgba(255,255,255,0.06);--tx:#E2E8F0;--mt:#64748B;--ac:#3B82F6;--gn:#10B981;--rd:#EF4444;--or:#F59E0B;--pu:#8B5CF6}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;min-height:100vh;max-width:620px;margin:0 auto;padding:16px 14px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
button{font-family:inherit;cursor:pointer;border:none}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:10px;animation:fadeIn .3s}
.kpi .lb{font-size:9px;color:var(--mt);margin-bottom:2px}.kpi .vl{font-size:19px;font-weight:800;letter-spacing:-0.5px}.kpi .sb{font-size:8px;color:var(--mt);margin-top:1px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
.tabs{display:flex;gap:2px;margin:10px 0;overflow-x:auto;padding-bottom:4px}
.tab{padding:6px 8px;border-radius:7px;font-size:10px;font-weight:600;white-space:nowrap;background:transparent;color:var(--mt);transition:all .15s}.tab.active{background:rgba(59,130,246,0.15);color:var(--ac)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:2px}.dot.ok{background:var(--gn)}.dot.no{background:var(--mt)}
.refresh{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:var(--ac);padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:9px}th{padding:5px 4px;text-align:left;font-size:8px;color:var(--mt);font-weight:600;border-bottom:1px solid var(--bd)}td{padding:6px 4px;border-bottom:1px solid var(--bd)}
.section{display:none}.section.active{display:block}
.setup-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--tx);font-size:13px;font-family:inherit;outline:none;margin-bottom:12px}.setup-input:focus{border-color:var(--ac)}
.connect-btn{width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);color:#fff;font-size:14px;font-weight:700}.connect-btn:disabled{opacity:0.5}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
.chg{display:inline-block;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700}.chg.up{background:rgba(16,185,129,0.1);color:var(--gn)}.chg.down{background:rgba(239,68,68,0.1);color:var(--rd)}
.alert{padding:10px 12px;border-radius:8px;font-size:10px;line-height:1.6;margin-bottom:8px}
.alert.warn{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);color:var(--or)}
.alert.bad{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);color:var(--rd)}
.alert.good{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.15);color:var(--gn)}
.camp-card{padding:12px;border-radius:10px;border:1px solid var(--bd);margin-bottom:8px;cursor:pointer;transition:all .15s}.camp-card:hover{border-color:rgba(255,255,255,0.12)}
.prod-row{padding:10px 0;border-bottom:1px solid var(--bd)}
.bar-wrap{height:3px;border-radius:2px;background:rgba(255,255,255,0.05);margin-top:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
</style>
</head>
<body>
<div id="setup" style="display:none;max-width:440px;margin:60px auto;padding:0 20px;animation:fadeIn .5s">
  <div style="text-align:center;margin-bottom:24px">
    <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px">📊</div>
    <h1 style="font-size:22px;font-weight:800">S.H.LEE Ad Monitor</h1>
    <p style="color:var(--mt);font-size:13px;margin-top:4px">구글시트 URL을 입력하세요</p>
  </div>
  <input id="sheetInput" class="setup-input" placeholder="https://docs.google.com/spreadsheets/d/...">
  <button id="connectBtn" class="connect-btn" onclick="handleConnect()">구글시트 연결</button>
  <div style="margin-top:24px;padding:16px;background:rgba(255,255,255,0.02);border:1px solid var(--bd);border-radius:10px;font-size:11px;color:var(--mt);line-height:1.8">
    <b style="color:var(--tx)">시트 탭 4개</b><br>
    <b style="color:var(--tx)">campaign</b> — SP 타겟팅 리포트 (캠페인+키워드)<br>
    <b style="color:var(--tx)">advertised_product</b> — SP 광고 상품 리포트 (ASIN별 광고비)<br>
    <b style="color:var(--tx)">search_terms</b> — 검색어 보고서<br>
    <b style="color:var(--tx)">business_report</b> — 비즈니스 리포트 (트래픽/CVR)<br><br>
    <b style="color:var(--or)">파일 → 공유 → 웹에 게시 → 게시</b>
  </div>
</div>

<div id="dashboard" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:13px">📊</div>
      <div><div style="font-size:16px;font-weight:800">S.H.LEE Ad Monitor</div><div id="statusDots" style="font-size:8px;color:var(--mt)"></div></div>
    </div>
    <button class="refresh" onclick="handleRefresh()" id="refreshBtn">🔄 동기화</button>
  </div>
  <div id="lastSyncText" style="font-size:8px;color:var(--mt);text-align:right;margin-bottom:4px"></div>
  <div class="tabs" id="tabBar"></div>
  <div id="sec-funnel" class="section"></div>
  <div id="sec-campaign" class="section"></div>
  <div id="sec-search" class="section"></div>
  <div id="sec-product" class="section"></div>
  <div id="sec-ai" class="section"></div>
  <div id="sec-settings" class="section"></div>
</div>

<script>
// ═══ JSONP ═══
function loadSheet(id,tab){return new Promise(res=>{const cb='_c'+Math.random().toString(36).substr(2,8);const s=document.createElement('script');let d=false;
window[cb]=function(r){d=true;delete window[cb];if(s.parentNode)s.remove();res(r&&r.status==='ok'&&r.table?gviz(r.table):null)};
s.src=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(tab)}`;
s.onerror=()=>{if(!d){d=true;delete window[cb];res(null)}};setTimeout(()=>{if(!d){d=true;delete window[cb];if(s.parentNode)s.remove();res(null)}},10000);document.head.appendChild(s)})}
function gviz(t){if(!t||!t.cols||!t.rows)return[];const h=t.cols.map(c=>(c.label||c.id||'').trim());
return t.rows.map(row=>{const o={};(row.c||[]).forEach((c,i)=>{if(i<h.length)o[h[i]]=c?(c.v!=null?String(c.v):''):''});return o}).filter(o=>Object.values(o).some(v=>v!==''))}

// ═══ STATE ═══
let S={sheetId:"",campaign:[],ap:[],st:[],br:[],sync:{campaign:false,advertised_product:false,search_terms:false,business_report:false},lastSync:"",tab:"funnel"};
const LS={set(k,v){try{localStorage.setItem("sh_"+k,JSON.stringify(v))}catch(e){}},get(k,d){try{const v=localStorage.getItem("sh_"+k);return v?JSON.parse(v):d}catch(e){return d}},clear(){Object.keys(localStorage).filter(k=>k.startsWith("sh_")).forEach(k=>localStorage.removeItem(k))}};
const pn=s=>{const n=parseFloat(String(s||0).replace(/[,$%]/g,""));return isNaN(n)?0:n};
const sm=a=>a.reduce((x,y)=>x+y,0);const av=a=>a.length?sm(a)/a.length:0;
function fixD(d){const m=String(d).match(/Date\((\d+),(\d+),(\d+)\)/);return m?`${m[1]}-${String(+m[2]+1).padStart(2,'0')}-${m[3].padStart(2,'0')}`:d}

// ═══ PARSERS ═══
// campaign tab: now captures Campaign Name
// campaign tab: SP Targeting Report (Daily)
// Actual Amazon columns: Date, Portfolio name, Campaign Name, Ad Group Name, Targeting, Match Type, Customer Search Term, State, Suggested bid..., Bid, Impressions, Top-of-search impression share, Clicks, CTR, Total cost, CPC, Purchases, Sales, ACOS, ROAS
function parseC(rows){return rows.map(r=>({date:fixD(r["Date"]||""),
  camp:r["Campaign Name"]||r["Campaign"]||"(미지정)",
  purpose:r["Purpose"]||r["목적"]||"",
  kw:r["Targeting"]||r["Keyword"]||"",
  mt:r["Match Type"]||r["Target match type"]||"",
  bid:pn(r["Bid (USD)"]||r["Bid"]),
  sug:pn(r["Suggested bid (median)(USD)"]||r["Suggested Bid"]),
  imp:pn(r["Impressions"]),clk:pn(r["Clicks"]),
  tos:r["Top-of-search impression share"]||"",
  cost:pn(r["Total cost (USD)"]||r["Spend"]),
  pur:pn(r["Purchases"]||r["7 Day Total Orders"]||r["Orders"]),
  sales:pn(r["Sales (USD)"]||r["7 Day Total Sales"]||r["Sales"]),
  status:r["State"]||r["Status"]||""})).filter(r=>r.kw)}

// advertised_product tab: SP Advertised Product Report (Daily)
// Actual: Date, Portfolio name, Campaign Name, Ad Group Name, Advertised SKU, Advertised ASIN, Impressions, Clicks, CTR, Total cost, CPC, Purchases, Sales, ACOS, ROAS
function parseAP(rows){return rows.map(r=>({date:fixD(r["Date"]||""),
  camp:r["Campaign Name"]||r["Campaign"]||"",
  asin:r["Advertised ASIN"]||r["ASIN"]||"",
  sku:r["Advertised SKU"]||r["SKU"]||"",
  imp:pn(r["Impressions"]),clk:pn(r["Clicks"]),
  cost:pn(r["Total cost (USD)"]||r["Spend"]),
  pur:pn(r["Purchases"]||r["7 Day Total Orders"]||r["Orders"]),
  sales:pn(r["Sales (USD)"]||r["7 Day Total Sales"]||r["Sales"])})).filter(r=>r.asin)}

// search_terms tab: SP Search Term Report (Daily)
// Actual: Date, Portfolio name, Campaign Name, Ad Group Name, Targeting, Match Type, Customer Search Term, Impressions, Clicks, CTR, Total cost, CPC, 7 Day Total Orders, 7 Day Total Sales, 7 Day Total Units, ACOS, ROAS
function parseST(rows){return rows.map(r=>({date:fixD(r["Date"]||""),
  query:r["Customer Search Term"]||r["Search Term"]||"",
  kw:r["Targeting"]||r["Keyword"]||"",
  camp:r["Campaign Name"]||"",
  imp:pn(r["Impressions"]),clk:pn(r["Clicks"]),
  cost:pn(r["Total cost (USD)"]||r["Spend"]),
  sales:pn(r["7 Day Total Sales"]||r["Sales (USD)"]||r["Sales"]),
  orders:pn(r["7 Day Total Orders"]||r["Purchases"]||r["Orders"])})).filter(r=>r.query)}

// business_report tab: Detail Page Sales and Traffic by Child Item
// Actual: Date, (Child) ASIN, Title, Sessions - Total, Session Percentage - Total, Page Views - Total, Page Views Percentage - Total, Featured Offer (Buy Box) Percentage, Units Ordered, Units Ordered - B2B, Unit Session Percentage, Unit Session Percentage - B2B, Ordered Product Sales, Ordered Product Sales - B2B
function parseBR(rows){return rows.map(r=>({date:fixD(r["Date"]||""),
  asin:r["(Child) ASIN"]||r["ASIN"]||"",title:r["Title"]||"",
  sessions:pn(r["Sessions - Total"]||r["Sessions"]),
  pv:pn(r["Page Views - Total"]||r["Page Views"]),
  units:pn(r["Units Ordered"]||r["Units Ordered - Total"]),
  sales:pn(r["Ordered Product Sales"]||r["Ordered Product Sales - Total"]),
  cvr:pn(r["Unit Session Percentage"]||r["Unit Session Percentage - Total"]),
  bbox:pn(r["Featured Offer (Buy Box) Percentage"]||r["Buy Box Percentage"])})).filter(r=>r.asin)}

// ═══ ANALYSIS ═══
function dailyAd(data){const by={};data.forEach(r=>{if(!r.date)return;if(!by[r.date])by[r.date]={date:r.date,cost:0,sales:0,imp:0,clk:0,pur:0};
by[r.date].cost+=r.cost;by[r.date].sales+=r.sales;by[r.date].imp+=r.imp;by[r.date].clk+=r.clk;by[r.date].pur+=r.pur});
return Object.values(by).sort((a,b)=>a.date.localeCompare(b.date)).map(d=>({...d,acos:d.sales>0?(d.cost/d.sales*100):0}))}

function campTotals(data){const by={};data.forEach(r=>{const c=r.camp;if(!by[c])by[c]={name:c,purpose:"",imp:0,clk:0,cost:0,pur:0,sales:0,kws:new Set(),budget:false};
by[c].imp+=r.imp;by[c].clk+=r.clk;by[c].cost+=r.cost;by[c].pur+=r.pur;by[c].sales+=r.sales;by[c].kws.add(r.kw);
if(r.purpose)by[c].purpose=r.purpose;if(r.status.includes("BUDGET"))by[c].budget=true});
return Object.values(by).map(c=>({...c,kwCount:c.kws.size,acos:c.sales>0?(c.cost/c.sales*100):0,ctr:c.imp>0?(c.clk/c.imp*100):0})).sort((a,b)=>b.sales-a.sales)}

function kwByCamp(data,campName){return data.filter(r=>r.camp===campName)}

function kwTotals(data){const by={};data.forEach(r=>{if(!by[r.kw])by[r.kw]={kw:r.kw,mt:r.mt,bid:r.bid,sug:r.sug,imp:0,clk:0,cost:0,pur:0,sales:0,budget:false,camp:r.camp};
by[r.kw].imp+=r.imp;by[r.kw].clk+=r.clk;by[r.kw].cost+=r.cost;by[r.kw].pur+=r.pur;by[r.kw].sales+=r.sales;by[r.kw].bid=r.bid;by[r.kw].sug=r.sug;
if(r.status.includes("BUDGET"))by[r.kw].budget=true});
return Object.values(by).map(k=>({...k,acos:k.sales>0?(k.cost/k.sales*100):0})).sort((a,b)=>b.sales-a.sales)}

function asinAdTotals(data){const by={};data.forEach(r=>{if(!by[r.asin])by[r.asin]={asin:r.asin,sku:r.sku,camp:r.camp,imp:0,clk:0,cost:0,pur:0,sales:0};
by[r.asin].imp+=r.imp;by[r.asin].clk+=r.clk;by[r.asin].cost+=r.cost;by[r.asin].pur+=r.pur;by[r.asin].sales+=r.sales});
return Object.values(by).map(a=>({...a,acos:a.sales>0?(a.cost/a.sales*100):0})).sort((a,b)=>b.sales-a.sales)}

function asinTraffic(data){const by={};data.forEach(r=>{if(!by[r.asin])by[r.asin]={asin:r.asin,title:r.title,sess:0,pv:0,units:0,sales:0,cvrs:[],bboxs:[]};
by[r.asin].sess+=r.sessions;by[r.asin].pv+=r.pv;by[r.asin].units+=r.units;by[r.asin].sales+=r.sales;if(r.cvr>0)by[r.asin].cvrs.push(r.cvr);if(r.bbox>0)by[r.asin].bboxs.push(r.bbox)});
return Object.values(by).map(a=>({...a,cvr:av(a.cvrs),bbox:av(a.bboxs)})).sort((a,b)=>b.sess-a.sess)}

function pctCh(c,p){return p>0?((c-p)/p*100):0}
function chgB(v,inv){const val=inv?v*-1:v;if(Math.abs(val)<0.5)return'';return`<span class="chg ${val>0?"up":"down"}">${val>0?"+":""}${val.toFixed(1)}%</span>`}

// ═══ SYNC ═══
async function syncAll(id){const sync={campaign:false,advertised_product:false,search_terms:false,business_report:false};
const c=await loadSheet(id,"campaign");if(c&&c.length){S.campaign=parseC(c);LS.set("c",S.campaign);sync.campaign=true}
const a=await loadSheet(id,"advertised_product");if(a&&a.length){S.ap=parseAP(a);LS.set("a",S.ap);sync.advertised_product=true}
const s=await loadSheet(id,"search_terms");if(s&&s.length){S.st=parseST(s);LS.set("s",S.st);sync.search_terms=true}
const b=await loadSheet(id,"business_report");if(b&&b.length){S.br=parseBR(b);LS.set("b",S.br);sync.business_report=true}
S.sync=sync;S.lastSync=new Date().toLocaleString("ko-KR");LS.set("sync",sync);LS.set("last",S.lastSync);return sync}

// ═══ CONNECT ═══
async function handleConnect(){const url=document.getElementById("sheetInput").value;const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
if(!m){alert("URL을 정확히 붙여넣어 주세요.");return}const btn=document.getElementById("connectBtn");
btn.disabled=true;btn.innerHTML='<span class="spinner"></span>연결 중...';S.sheetId=m[1];LS.set("id",S.sheetId);
await syncAll(S.sheetId);btn.disabled=false;btn.textContent="구글시트 연결";showDashboard()}
async function handleRefresh(){const btn=document.getElementById("refreshBtn");
btn.innerHTML='<span class="spinner" style="width:10px;height:10px;border-width:1.5px"></span>';
await syncAll(S.sheetId);btn.textContent="🔄 동기화";renderHeader();renderTab()}

// ═══ RENDER CORE ═══
let charts={};function dc(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={}}
function renderHeader(){document.getElementById("statusDots").innerHTML=
`<span class="dot ${S.sync.campaign?"ok":"no"}"></span>캠페인 <span class="dot ${S.sync.advertised_product?"ok":"no"}"></span>상품광고 <span class="dot ${S.sync.search_terms?"ok":"no"}"></span>검색어 <span class="dot ${S.sync.business_report?"ok":"no"}"></span>트래픽`;
document.getElementById("lastSyncText").textContent=S.lastSync?"마지막: "+S.lastSync:""}
function renderTabs(){const bar=document.getElementById("tabBar");bar.innerHTML="";
[["funnel","🔬 퍼널"],["campaign","📊 캠페인"],["search","🔍 검색어"],["product","📦 상품"],["ai","🤖 AI"],["settings","⚙️"]].forEach(([id,l])=>{
const b=document.createElement("button");b.className="tab"+(S.tab===id?" active":"");b.textContent=l;
b.onclick=()=>{S.tab=id;renderTabs();renderTab()};bar.appendChild(b)})}
function renderTab(){dc();document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
const el=document.getElementById("sec-"+S.tab);if(!el)return;el.classList.add("active");el.innerHTML="";
({funnel:renderFunnel,campaign:renderCampaign,search:renderSearch,product:renderProduct,ai:renderAi,settings:renderSettings})[S.tab]?.(el)}
function kpi(l,v,sub,color){return`<div class="card kpi"><div class="lb">${l}</div><div class="vl" style="color:${color}">${v}</div>${sub?`<div class="sb">${sub}</div>`:""}</div>`}
function empty(i,t,d){return`<div class="card" style="text-align:center;padding:28px"><div style="font-size:24px;margin-bottom:8px">${i}</div><div style="font-size:12px;font-weight:700;margin-bottom:6px">${t}</div><div style="font-size:10px;color:var(--mt);line-height:1.6">${d}</div></div>`}

// ══════════════════════════════════════
// TAB 1: 퍼널 진단
// ══════════════════════════════════════
function renderFunnel(el){
  const daily=dailyAd(S.campaign);const kws=kwTotals(S.campaign);const camps=campTotals(S.campaign);
  const tCost=sm(daily.map(d=>d.cost)),tSales=sm(daily.map(d=>d.sales)),tImp=sm(daily.map(d=>d.imp)),tClk=sm(daily.map(d=>d.clk)),tPur=sm(daily.map(d=>d.pur));
  const acos=tSales>0?(tCost/tSales*100):0;const ctr=tImp>0?(tClk/tImp*100):0;
  const avgCVR=av(S.br.filter(r=>r.cvr>0).map(r=>r.cvr));
  const nDays=[...new Set(S.campaign.map(r=>r.date))].length;
  const budgetKws=kws.filter(k=>k.budget).length;const zeroKws=kws.filter(k=>k.clk>=5&&k.sales===0).length;

  // Day-over-day
  let html="";
  if(daily.length>=2){const t=daily[daily.length-1],y=daily[daily.length-2];
    html+=`<div class="card"><div style="font-size:11px;font-weight:700;margin-bottom:8px">전일 대비 (${t.date})</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:10px">
    <div>매출 $${t.sales.toFixed(0)} ${chgB(pctCh(t.sales,y.sales))}</div>
    <div>광고비 $${t.cost.toFixed(0)} ${chgB(pctCh(t.cost,y.cost))}</div>
    <div>ACOS ${t.acos.toFixed(0)}% ${chgB(pctCh(t.acos,y.acos),true)}</div>
    <div>노출 ${t.imp.toLocaleString()} ${chgB(pctCh(t.imp,y.imp))}</div>
    <div>클릭 ${t.clk} ${chgB(pctCh(t.clk,y.clk))}</div>
    <div>구매 ${t.pur} ${chgB(pctCh(t.pur,y.pur))}</div></div></div>`}

  // Alerts
  let alerts="";
  if(budgetKws>0)alerts+=`<div class="alert warn">⚠ ${budgetKws}개 키워드 예산 소진 상태</div>`;

function renderSearch(el){
  if(!S.st.length){el.innerHTML=empty("🔍","검색어 데이터 대기 중","search_terms 탭 동기화 필요");return}
  const byQ={};S.st.forEach(s=>{if(!byQ[s.query])byQ[s.query]={q:s.query,imp:0,clk:0,cost:0,sales:0,orders:0};
    byQ[s.query].imp+=s.imp;byQ[s.query].clk+=s.clk;byQ[s.query].cost+=s.cost;byQ[s.query].sales+=s.sales;byQ[s.query].orders+=s.orders});
  const all=Object.values(byQ);const profit=all.filter(s=>s.sales>0).sort((a,b)=>b.sales-a.sales);
  const waste=all.filter(s=>s.cost>0&&s.sales===0).sort((a,b)=>b.cost-a.cost);

  let html=`<div class="g3">${kpi("검색어",""+all.length,"","#E2E8F0")}${kpi("매출",""+profit.length,"","#10B981")}${kpi("낭비",""+waste.length,"$"+sm(waste.map(w=>w.cost)).toFixed(0),"#EF4444")}</div>`;
  if(profit.length){html+=`<div class="card"><div style="font-size:11px;font-weight:700;margin-bottom:6px;color:#10B981">매출 기여 TOP 10</div>`;
    profit.slice(0,10).forEach(s=>{const ac=s.sales>0?(s.cost/s.sales*100):0;
      html+=`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:10px">
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.q}</span>
        <span style="color:#10B981;font-weight:700;min-width:45px;text-align:right">$${s.sales.toFixed(0)}</span>
        <span style="color:${ac>30?"#F59E0B":"#64748B"};min-width:35px;text-align:right;font-size:9px">${ac.toFixed(0)}%</span></div>`});
    html+=`</div>`}
  if(waste.length){html+=`<div class="card"><div style="font-size:11px;font-weight:700;margin-bottom:6px;color:#EF4444">비용 낭비 TOP 10 (네거티브 후보)</div>`;
    waste.slice(0,10).forEach(s=>{html+=`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:10px">
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.q}</span>
      <span style="color:#EF4444;font-weight:700;min-width:50px;text-align:right">-$${s.cost.toFixed(2)}</span></div>`});
    html+=`</div>`}
  el.innerHTML=html;
}

function renderProduct(el){
  const adAsins=asinAdTotals(S.ap);const trAsins=asinTraffic(S.br);

  if(!adAsins.length&&!trAsins.length){el.innerHTML=empty("📦","상품 데이터 대기 중","advertised_product 또는 business_report 탭 동기화 필요");return}

  // Merge ad + traffic by ASIN
  const merged={};
  adAsins.forEach(a=>{merged[a.asin]={asin:a.asin,sku:a.sku,title:"",adImp:a.imp,adClk:a.clk,adCost:a.cost,adPur:a.pur,adSales:a.sales,acos:a.acos,sess:0,cvr:0,bbox:0,totalUnits:0}});
  trAsins.forEach(a=>{if(!merged[a.asin])merged[a.asin]={asin:a.asin,sku:"",title:a.title,adImp:0,adClk:0,adCost:0,adPur:0,adSales:0,acos:0,sess:0,cvr:0,bbox:0,totalUnits:0};
    merged[a.asin].title=a.title||merged[a.asin].title;merged[a.asin].sess=a.sess;merged[a.asin].cvr=a.cvr;merged[a.asin].bbox=a.bbox;merged[a.asin].totalUnits=a.units});
  const products=Object.values(merged).sort((a,b)=>(b.adSales+b.sess)-(a.adSales+a.sess));

  const totalAdCost=sm(adAsins.map(a=>a.cost));const totalAdSales=sm(adAsins.map(a=>a.sales));
  const totalSess=sm(trAsins.map(a=>a.sess));

  let html=`<div class="g3">${kpi("광고 상품",adAsins.length+"개","$"+totalAdCost.toFixed(0)+" 광고비","#3B82F6")}
    ${kpi("광고 매출","$"+totalAdSales.toFixed(0),totalAdSales>0?"ACOS "+(totalAdCost/totalAdSales*100).toFixed(0)+"%":"","#10B981")}
    ${kpi("총 세션",totalSess.toLocaleString(),trAsins.length+"개 ASIN","#8B5CF6")}</div>`;

  if(!adAsins.length)html+=`<div class="alert warn">⚠ advertised_product 탭이 비어있습니다. SP Advertised Product Report를 추가하면 상품별 광고비/매출을 볼 수 있습니다.</div>`;

  html+=`<div class="card"><div style="font-size:12px;font-weight:700;margin-bottom:8px">상품별 성과</div>`;
  products.slice(0,20).forEach(p=>{
    const acosColor=p.acos>100?"#EF4444":p.acos>30?"#F59E0B":p.acos>0?"#10B981":"#64748B";
    const cvrColor=p.cvr>10?"#10B981":p.cvr>5?"#F59E0B":p.cvr>0?"#EF4444":"#64748B";
    html+=`<div class="prod-row">
      <div style="font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:4px">${p.title||p.asin}</div>
      <div style="font-size:9px;color:var(--mt);margin-bottom:4px">${p.asin}${p.sku?" · "+p.sku:""}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:10px">
        <div style="padding:6px 8px;background:rgba(59,130,246,0.05);border-radius:6px">
          <div style="font-size:8px;color:var(--mt);margin-bottom:2px">광고 성과</div>
          ${p.adCost>0?`<div>광고비 <b>$${p.adCost.toFixed(0)}</b> → 매출 <b style="color:#10B981">$${p.adSales.toFixed(0)}</b></div>
          <div>ACOS <b style="color:${acosColor}">${p.acos.toFixed(0)}%</b> · ${p.adClk}클릭 · ${p.adPur}구매</div>`
          :`<div style="color:var(--mt)">광고 데이터 없음</div>`}
        </div>
        <div style="padding:6px 8px;background:rgba(139,92,246,0.05);border-radius:6px">
          <div style="font-size:8px;color:var(--mt);margin-bottom:2px">트래픽</div>
          ${p.sess>0?`<div>세션 <b>${p.sess.toLocaleString()}</b> · ${p.totalUnits}주문</div>
          <div>CVR <b style="color:${cvrColor}">${p.cvr.toFixed(1)}%</b>${p.bbox>0?" · BB "+p.bbox.toFixed(0)+"%":""}</div>`
          :`<div style="color:var(--mt)">트래픽 데이터 없음</div>`}
        </div>
      </div>
    </div>`;
  });
  html+=`</div>`;
  el.innerHTML=html;
}

목표: 구형/저성과 상품 빠르게 소진, 보관료 절감

- 이 조건이면 FBA 반품/폐기 검토`},

  conquest:{label:"🎯 경쟁사 공략",color:"#06B6D4",desc:"브랜드/ASIN 타겟",

폰 케이스 시장 주요 경쟁사: Spigen, Caseology, OtterBox, ESR, Ringke

반드시 다음 형식으로 답변 (한국어, 마크다운 없이):

[현재 경쟁 상황] 데이터에서 경쟁사 관련 키워드 유무 확인

  seasonal:{label:"📅 시즌 대비",color:"#F97316",desc:"프라임데이, 블프, iPhone",

반드시 다음 형식으로 답변 (한국어, 마크다운 없이):

async function runAi(){
  if(aiState.loading)return;aiState.loading=true;renderAi(document.getElementById("sec-ai"));
  const mode=AI_MODES[aiState.mode];const daily=dailyAd(S.campaign);const kws=kwTotals(S.campaign);const camps=campTotals(S.campaign);const adA=asinAdTotals(S.ap);const trA=asinTraffic(S.br);

  // Merge product ad + traffic
  const prodMerged={};
  adA.forEach(a=>{prodMerged[a.asin]={asin:a.asin,sku:a.sku,adCost:+a.cost.toFixed(1),adSales:+a.sales.toFixed(0),adPur:a.pur,acos:+a.acos.toFixed(0),sess:0,cvr:0,bbox:0}});
  trA.forEach(a=>{if(!prodMerged[a.asin])prodMerged[a.asin]={asin:a.asin,sku:"",adCost:0,adSales:0,adPur:0,acos:0,sess:0,cvr:0,bbox:0};
    prodMerged[a.asin].title=a.title;prodMerged[a.asin].sess=a.sess;prodMerged[a.asin].cvr=+a.cvr.toFixed(1);prodMerged[a.asin].bbox=+a.bbox.toFixed(0)});

  // Build search term summary
  const stByQ={};S.st.forEach(s=>{if(!stByQ[s.query])stByQ[s.query]={q:s.query,cost:0,sales:0,clk:0};stByQ[s.query].cost+=s.cost;stByQ[s.query].sales+=s.sales;stByQ[s.query].clk+=s.clk});
  const stWaste=Object.values(stByQ).filter(s=>s.cost>0&&s.sales===0).sort((a,b)=>b.cost-a.cost).slice(0,10);

  const ctx={
    summary:{days:[...new Set(S.campaign.map(r=>r.date))].length,totalCost:+sm(daily.map(d=>d.cost)).toFixed(0),totalSales:+sm(daily.map(d=>d.sales)).toFixed(0),
      totalPur:sm(daily.map(d=>d.pur)),acos:sm(daily.map(d=>d.sales))>0?+(sm(daily.map(d=>d.cost))/sm(daily.map(d=>d.sales))*100).toFixed(1):0},
    campaigns:camps.map(c=>({name:c.name,purpose:c.purpose||"미지정",kwCount:c.kwCount,cost:+c.cost.toFixed(0),sales:+c.sales.toFixed(0),acos:+c.acos.toFixed(0),ctr:+c.ctr.toFixed(2),budgetIssue:c.budget})),
    allKeywords:kws.map(k=>({keyword:k.kw,campaign:k.camp,matchType:k.mt,currentBid:k.bid,suggestedBid:k.sug,impressions:k.imp,clicks:k.clk,purchases:k.pur,cost:+k.cost.toFixed(1),sales:+k.sales.toFixed(0),acos:+k.acos.toFixed(0),budgetIssue:k.budget})),
    products:Object.values(prodMerged).sort((a,b)=>(b.adSales||0)-(a.adSales||0)).slice(0,12),
    wasteSearchTerms:stWaste.map(s=>({query:s.q,clicks:s.clk,cost:+s.cost.toFixed(2),sales:0})),
  };
  try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,
      messages:[{role:"user",content:mode.prompt+`\n\n중요: 각 캠페인에 purpose(목적) 필드가 있습니다. 목적에 따라 성과 기준이 다릅니다:
- launch(런칭): ACOS 높아도 OK, 노출/클릭 볼륨이 핵심
- bestseller(베스트셀러): ACOS 30% 이하, 수익 극대화
- clearance(재고정리): 회전율 우선, 마진보다 소진 속도
- conquest(경쟁사): ACOS 자연적으로 높음, 브랜드 인지도 기준
- seasonal(시즌): 이벤트 전 공격적, 이벤트 후 정상화
- defense(방어): 오가닉 순위 방어, 최소 광고비
- "미지정": 데이터 기반으로 추론하되, 추론이라고 명시

캠페인별 목적에 맞는 기준으로 예산/입찰가/키워드를 판단하세요.
한국어, 마크다운 없이 일반 텍스트.\n\n데이터:\n`+JSON.stringify(ctx,null,1)}]})});
    const d=await r.json();aiState.result=d.content?.map(c=>c.text||"").join("")||"실패";
  }catch(e){aiState.result="오류: "+e.message}
  aiState.loading=false;LS.set("aiR",aiState.result);LS.set("aiM",aiState.mode);renderAi(document.getElementById("sec-ai"));
}

function renderAi(el){if(!el)return;
  let html=`<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px">전략 유형 선택</div><div style="display:flex;flex-direction:column;gap:5px">`;
  Object.entries(AI_MODES).forEach(([k,m])=>{const sel=aiState.mode===k;
    html+=`<div style="padding:9px;border-radius:8px;border:2px solid ${sel?m.color:"var(--bd)"};background:${sel?m.color+"15":"transparent"};cursor:pointer"
      onclick="aiState.mode='${k}';renderAi(document.getElementById('sec-ai'))">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:11px;font-weight:700;color:${sel?m.color:"var(--tx)"}">${m.label}</div>
          <div style="font-size:9px;color:var(--mt)">${m.desc}</div></div>
        <div style="width:14px;height:14px;border-radius:50%;border:2px solid ${sel?m.color:"var(--bd)"};display:flex;align-items:center;justify-content:center">
          ${sel?`<div style="width:7px;height:7px;border-radius:50%;background:${m.color}"></div>`:""}</div></div></div>`});
  html+=`</div></div>`;
  const mode=AI_MODES[aiState.mode];const has=S.campaign.length>0;
  html+=`<div class="card"><button onclick="runAi()" ${!has||aiState.loading?"disabled":""} style="width:100%;padding:12px;border-radius:10px;border:none;
    background:linear-gradient(135deg,${mode.color},${mode.color}99);color:#fff;font-size:13px;font-weight:700;opacity:${has?1:.5}">
    ${aiState.loading?'<span class="spinner"></span>분석 중...':'🤖 '+mode.label+' 분석'}</button></div>`;
  if(aiState.result)html+=`<div class="card" style="border-color:${mode.color}20">
    <div style="font-size:12px;font-weight:700;color:${mode.color};margin-bottom:8px">${mode.label} 결과</div>
    <div style="font-size:11px;color:#CBD5E1;line-height:1.8;white-space:pre-wrap">${aiState.result}</div></div>`;
  el.innerHTML=html;
}
