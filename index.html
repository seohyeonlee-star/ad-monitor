<script>
// ═══════════════════════════════════════
// JSONP: bypasses CORS completely
// Works from file:// protocol
// ═══════════════════════════════════════
function loadSheetJSONP(sheetId, tabName) {
  return new Promise((resolve) => {
    const cb = '_cb_' + Math.random().toString(36).substr(2, 8);
    const script = document.createElement('script');
    let done = false;

    window[cb] = function(resp) {
      done = true;
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      if (resp && resp.status === 'ok' && resp.table) {
        resolve(gvizToRows(resp.table));
      } else {
        resolve(null);
      }
    };

    script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(tabName)}`;
    script.onerror = function() {
      if (!done) { done = true; delete window[cb]; resolve(null); }
    };
    // Timeout fallback
    setTimeout(() => { if (!done) { done = true; delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); resolve(null); } }, 10000);

    document.head.appendChild(script);
  });
}

// Test if sheet is accessible at all (try loading first sheet)
function testSheetAccess(sheetId) {
  return new Promise((resolve) => {
    const cb = '_test_' + Math.random().toString(36).substr(2, 8);
    const script = document.createElement('script');
    let done = false;

    window[cb] = function(resp) {
      done = true; delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
      resolve(resp && (resp.status === 'ok' || resp.table));
    };

    script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:${cb}`;
    script.onerror = function() { if (!done) { done = true; delete window[cb]; resolve(false); } };
    setTimeout(() => { if (!done) { done = true; delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); resolve(false); } }, 8000);

    document.head.appendChild(script);
  });
}

// Convert gviz table format to array of objects
function gvizToRows(table) {
  if (!table || !table.cols || !table.rows) return [];
  const headers = table.cols.map(c => (c.label || c.id || '').trim());
  return table.rows.map(row => {
    const obj = {};
    (row.c || []).forEach((cell, i) => {
      if (i < headers.length) {
        obj[headers[i]] = cell ? (cell.v != null ? String(cell.v) : '') : '';
      }
    });
    return obj;
  }).filter(obj => Object.values(obj).some(v => v !== ''));
}

// ═══════════════════════════════════════
let state = {
  sheetId:"", ad:{cost:0,sales:0,purchases:0,clicks:0,impressions:0},
  kw:[], st:[], br:[],
  sync:{campaign:false,search_terms:false,business_report:false},

};
const LS={

  get(k,d){try{const v=localStorage.getItem("shlee_"+k);return v?JSON.parse(v):d}catch(e){return d}},
  clear(){Object.keys(localStorage).filter(k=>k.startsWith("shlee_")).forEach(k=>localStorage.removeItem(k))},
};

// ═══════════════════════════════════════
// PARSERS (accept arrays of objects)
// ═══════════════════════════════════════
const pn=s=>{const n=parseFloat(String(s||0).replace(/[,$%]/g,""));return isNaN(n)?0:n};
const sm=a=>a.reduce((x,y)=>x+y,0);

function parseCampaignData(rows){
  const kw=rows.map(r=>({kw:r["Keyword"]||"",mt:r["Target match type"]||r["Match Type"]||"",
    bid:pn(r["Bid (USD)"]||r["Bid"]),sug:pn(r["Suggested bid (median)(USD)"]||r["Suggested Bid"]),
    imp:pn(r["Impressions"]),clk:pn(r["Clicks"]),cost:pn(r["Total cost (USD)"]||r["Spend"]),
    pur:pn(r["Purchases"]||r["Orders"]),sales:pn(r["Sales (USD)"]||r["Sales"]),status:r["Status"]||"",
  })).filter(k=>k.kw);
  kw.forEach(k=>{k.acos=k.sales>0?(k.cost/k.sales*100):0});
  return{ad:{cost:sm(kw.map(k=>k.cost)),sales:sm(kw.map(k=>k.sales)),purchases:sm(kw.map(k=>k.pur)),
    clicks:sm(kw.map(k=>k.clk)),impressions:sm(kw.map(k=>k.imp))},kw};
}
function parseSTData(rows){
  return rows.map(r=>({query:r["Customer Search Term"]||r["Search Term"]||"",
    imp:pn(r["Impressions"]),clk:pn(r["Clicks"]),cost:pn(r["Spend"]||r["Total cost (USD)"]),
    sales:pn(r["7 Day Total Sales"]||r["Sales"]),orders:pn(r["7 Day Total Orders"]||r["Orders"]),
  })).filter(r=>r.query);
}
function parseBRData(rows){
  return rows.map(r=>({asin:r["(Child) ASIN"]||r["ASIN"]||"",title:r["Title"]||"",
    sessions:pn(r["Sessions"]||r["Sessions - Total"]),pageViews:pn(r["Page Views"]||r["Page Views - Total"]),
    units:pn(r["Units Ordered"]||r["Units Ordered - Total"]),
    cvr:pn(r["Unit Session Percentage"]||r["Unit Session Percentage - Total"])
  })).filter(r=>r.asin);
}

// ═══════════════════════════════════════
// SYNC
// ═══════════════════════════════════════
async function syncAll(id){
  const sync={campaign:false,search_terms:false,business_report:false};
  
  const cRows=await loadSheetJSONP(id,"campaign");
  if(cRows&&cRows.length){const r=parseCampaignData(cRows);if(r.kw.length){state.ad=r.ad;state.kw=r.kw;LS.set("ad",r.ad);LS.set("kw",r.kw);sync.campaign=true}}

  const sRows=await loadSheetJSONP(id,"search_terms");
  if(sRows&&sRows.length){const r=parseSTData(sRows);if(r.length){state.st=r;LS.set("st",r);sync.search_terms=true}}

  const bRows=await loadSheetJSONP(id,"business_report");
  if(bRows&&bRows.length){const r=parseBRData(bRows);if(r.length){state.br=r;LS.set("br",r);sync.business_report=true}}

  state.sync=sync;
  state.lastSync=new Date().toLocaleString("ko-KR");
  LS.set("sync",sync);LS.set("lastSync",state.lastSync);
  return sync;
}

// ═══════════════════════════════════════
// CONNECT & REFRESH
// ═══════════════════════════════════════
async function handleConnect(){
  const url=document.getElementById("sheetInput").value;
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  const errEl=document.getElementById("connectErr");
  const okEl=document.getElementById("connectOk");
  const btn=document.getElementById("connectBtn");
  
  if(!m){errEl.style.display="block";okEl.style.display="none";errEl.textContent="구글시트 URL을 정확히 붙여넣어 주세요.";return}
  
  // No access check — just save and go to dashboard
  const id=m[1];
  state.sheetId=id;LS.set("sheetId",id);
  
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>연결 중...';
  errEl.style.display="none";okEl.style.display="none";

  // Try to sync — if it works, great. If not, user can sync later.
  const sync=await syncAll(id);
  btn.disabled=false;btn.textContent="구글시트 연결";
  showDashboard();
}

async function handleRefresh(){
  if(!state.sheetId)return;
  const btn=document.getElementById("refreshBtn");
  btn.innerHTML='<span class="spinner" style="width:10px;height:10px;border-width:1.5px"></span>';
  await syncAll(state.sheetId);
  btn.textContent="🔄 동기화";
  renderHeader();renderCurrentTab();
}
function handleDisconnect(){LS.clear();location.reload()}

let salesChart=null;

function renderHeader(){
  document.getElementById("statusDots").innerHTML=
    `<span class="dot ${state.sync.campaign?"ok":"no"}"></span>캠페인 `+
    `<span class="dot ${state.sync.search_terms?"ok":"no"}"></span>검색어 `+
    `<span class="dot ${state.sync.business_report?"ok":"no"}"></span>트래픽`;
  document.getElementById("lastSyncText").textContent=state.lastSync?"마지막: "+state.lastSync:"";
}
function renderTabs(){
  const bar=document.getElementById("tabBar");bar.innerHTML="";
  [["sales","📈 판매"],["products","📦 상품"],["keywords","🔑 키워드"],["search","🔍 검색어"],["traffic","👥 트래픽"],["settings","⚙️ 설정"]].forEach(([id,l])=>{
    const b=document.createElement("button");b.className="tab"+(state.tab===id?" active":"");b.textContent=l;
    b.onclick=()=>{state.tab=id;renderTabs();renderCurrentTab()};bar.appendChild(b);
  });
}
function renderCurrentTab(){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  const sec=document.getElementById("sec-"+state.tab);
  if(!sec)return;sec.classList.add("active");sec.innerHTML="";
  ({sales:renderSales,products:renderProducts,keywords:renderKeywords,search:renderSearch,traffic:renderTraffic,settings:renderSettings})[state.tab]?.(sec);
}
function kpiCard(l,v,sub,color){
  const d=document.createElement("div");d.className="card kpi";
  d.innerHTML=`<div class="label">${l}</div><div class="value" style="color:${color}">${v}</div>${sub?`<div class="sub">${sub}</div>`:""}`;
  return d;
}
function emptyCard(icon,title,desc){
  const d=document.createElement("div");d.className="card";d.style.cssText="text-align:center;padding:28px";
  d.innerHTML=`<div style="font-size:24px;margin-bottom:8px">${icon}</div><div style="font-size:12px;font-weight:700;margin-bottom:6px">${title}</div><div style="font-size:10px;color:var(--mt);line-height:1.6">${desc}</div>`;
  return d;
}

// ── SALES ──
function renderSales(el){
  const ad=state.ad;const acos=ad.sales>0?(ad.cost/ad.sales*100):0;const roas=ad.cost>0?(ad.sales/ad.cost):0;
  if(ad.sales>0){
    const g1=document.createElement("div");g1.className="grid2";
    g1.appendChild(kpiCard("광고 매출","$"+ad.sales.toFixed(0),ad.purchases+"건","#10B981"));
    g1.appendChild(kpiCard("광고비","$"+ad.cost.toFixed(0),ad.clicks+"클릭","#F59E0B"));
    g1.appendChild(kpiCard("ACOS",acos.toFixed(1)+"%",acos>30?"목표초과":"양호",acos>30?"#EF4444":"#10B981"));
    g1.appendChild(kpiCard("ROAS",roas.toFixed(2)+"x",roas<3?"목표미달":"양호",roas<3?"#F59E0B":"#10B981"));
    el.appendChild(g1);
  } else {
    el.appendChild(emptyCard("📈","광고 데이터 대기 중","구글시트 <b>campaign</b> 탭에 데이터 입력 후 🔄 동기화"));
  }
  const cc=document.createElement("div");cc.className="card";
  const hdr=document.createElement("div");hdr.style.cssText="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px";
  hdr.innerHTML=`<div style="font-size:12px;font-weight:700">전체 판매 추이</div>`;
  const tog=document.createElement("div");tog.style.cssText="display:flex;gap:3px;background:rgba(255,255,255,0.04);border-radius:6px;padding:2px";
  ["daily","weekly"].forEach(m=>{
    const b=document.createElement("button");b.textContent=m==="daily"?"일별":"7일";
    b.style.cssText=`padding:3px 8px;border-radius:5px;border:none;font-size:9px;font-weight:600;background:${state.viewMode===m?"rgba(59,130,246,0.2)":"transparent"};color:${state.viewMode===m?"#3B82F6":"#64748B"}`;
    b.onclick=()=>{state.viewMode=m;renderCurrentTab()};tog.appendChild(b);
  });
  hdr.appendChild(tog);cc.appendChild(hdr);
  const canvas=document.createElement("canvas");canvas.style.cssText="height:160px;width:100%";cc.appendChild(canvas);el.appendChild(cc);
  if(salesChart)salesChart.destroy();
  setTimeout(()=>{
    let labels,data;
    if(state.viewMode==="daily"){labels=DATES;data=DATES.map((_,i)=>PRODUCTS.reduce((s,p)=>s+(p.v[i]||0),0));}
    else{labels=[];data=[];for(let i=0;i<30;i+=7){const sl=DATES.slice(i,Math.min(i+7,30));labels.push(sl[0]+"~"+sl[sl.length-1]);data.push(sl.reduce((_,__,j)=>_+PRODUCTS.reduce((s,p)=>s+(p.v[i+j]||0),0),0));}}
    salesChart=new Chart(canvas,{type:state.viewMode==="daily"?"line":"bar",
      data:{labels,datasets:[{label:"판매량",data,borderColor:"#3B82F6",backgroundColor:state.viewMode==="daily"?"rgba(59,130,246,0.1)":"rgba(59,130,246,0.6)",fill:true,tension:.3,borderWidth:2,borderRadius:4}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{ticks:{font:{size:8},color:"#64748B",maxRotation:0},grid:{display:false}},y:{ticks:{font:{size:8},color:"#64748B"},grid:{color:"rgba(255,255,255,0.03)"}}}}});
  },50);
}

// ── PRODUCTS ──
function renderProducts(el){
  const btns=document.createElement("div");btns.style.cssText="display:flex;gap:4px;margin-bottom:10px";
  ["total","change","margin"].forEach((id,i)=>{
    const b=document.createElement("button");b.textContent=["판매량","변동률","이익"][i];
    b.style.cssText=`padding:4px 9px;border-radius:6px;border:none;font-size:9px;font-weight:600;background:${state.sortBy===id?"rgba(59,130,246,0.15)":"rgba(255,255,255,0.04)"};color:${state.sortBy===id?"#3B82F6":"#64748B"}`;
    b.onclick=()=>{state.sortBy=id;renderCurrentTab()};btns.appendChild(b);
  });el.appendChild(btns);
  const sorted=[...PRODUCTS];if(state.sortBy==="total")sorted.sort((a,b)=>b.tm-a.tm);else if(state.sortBy==="change")sorted.sort((a,b)=>b.ch-a.ch);else sorted.sort((a,b)=>b.mProf-a.mProf);
  const card=document.createElement("div");card.className="card";
  card.innerHTML=`<div style="font-size:12px;font-weight:700;margin-bottom:8px">전체 상품 (${PRODUCTS.length}개)</div>`;
  sorted.forEach(p=>{
    const key=p.s+p.c;const row=document.createElement("div");row.style.cssText="padding:8px 0;border-bottom:1px solid var(--bd);cursor:pointer";
    row.onclick=()=>{state.expandedSku=state.expandedSku===key?null:key;renderCurrentTab()};
    const pillCls=p.ch>0?"up":p.ch<0?"down":"flat";
    row.innerHTML=`<div style="display:flex;justify-content:space-between;align-items:center">
      <div style="flex:1;min-width:0"><div style="font-size:11px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.c}${p.mg<0?'<span style="color:#EF4444;font-size:8px;margin-left:3px">적자</span>':""}</div>
        <div style="font-size:9px;color:#64748B">${p.d} · ${p.m}</div></div>
      <div style="text-align:right;min-width:60px"><div style="font-size:13px;font-weight:700">${p.tm}</div>
        <span class="pill ${pillCls}">${p.ch>0?"+":""}${p.ch.toFixed(1)}%</span></div></div>`;
    if(state.expandedSku===key){
      row.innerHTML+=`<div style="margin-top:8px;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;font-size:9px">
        <div><span style="color:#64748B">7일</span><br><b>${p.a7.toFixed(1)}</b></div>
        <div><span style="color:#64748B">이전</span><br><b>${p.ap7.toFixed(1)}</b></div>
        <div><span style="color:#64748B">마진</span><br><b style="color:${p.mg<0?"#EF4444":"#E2E8F0"}">$${p.mg}</b></div>
        <div><span style="color:#64748B">이익</span><br><b style="color:${p.mProf>0?"#10B981":"#EF4444"}">$${Math.round(p.mProf)}</b></div></div>`;}
    card.appendChild(row);
  });el.appendChild(card);
}

// ── KEYWORDS ──
function renderKeywords(el){
  if(!state.kw.length){el.appendChild(emptyCard("🔑","키워드 데이터 대기 중","<b>campaign</b> 탭에 데이터 입력 후 🔄 동기화"));return}
  const card=document.createElement("div");card.className="card";
  let html=`<div style="font-size:12px;font-weight:700;margin-bottom:6px">키워드 (${state.kw.length}개)</div><div style="overflow-x:auto"><table>
    <thead><tr>${["키워드","매치","입찰","추천","노출","클릭","구매","ACOS"].map(h=>"<th>"+h+"</th>").join("")}</tr></thead><tbody>`;
  state.kw.forEach(k=>{
    const low=k.bid<k.sug*0.7;const bg=k.sales>0?"rgba(16,185,129,0.03)":k.imp===0?"rgba(239,68,68,0.03)":"transparent";
    const ac=k.acos>100?"#EF4444":k.acos>30?"#F59E0B":k.acos>0?"#10B981":"#64748B";
    html+=`<tr style="background:${bg}">
      <td style="font-weight:500;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${k.kw}</td>
      <td style="color:#64748B">${(k.mt||"-")[0]}</td>
      <td style="color:${low?"#F59E0B":"#E2E8F0"};font-weight:${low?700:400}">${k.bid||"-"}</td>
      <td style="color:#64748B">${k.sug||"-"}</td>
      <td>${k.imp>0?k.imp.toLocaleString():"-"}</td><td>${k.clk||"-"}</td>
      <td style="color:${k.pur>0?"#10B981":"#64748B"};font-weight:700">${k.pur||"-"}</td>
      <td style="font-weight:600;color:${ac}">${k.acos>0?k.acos.toFixed(0)+"%":"-"}</td></tr>`;
  });
  html+="</tbody></table></div>";card.innerHTML=html;el.appendChild(card);
}

// ── SEARCH ──
function renderSearch(el){
  if(!state.st.length){el.appendChild(emptyCard("🔍","검색어 데이터 대기 중","<b>search_terms</b> 탭에 Search Term Report 입력 후 🔄 동기화"));return}
  const sorted=[...state.st].sort((a,b)=>pn(b.sales)-pn(a.sales));
  const profit=sorted.filter(s=>pn(s.sales)>0);const waste=sorted.filter(s=>pn(s.cost)>0&&pn(s.sales)===0).sort((a,b)=>pn(b.cost)-pn(a.cost));
  const g=document.createElement("div");g.className="grid3";
  g.appendChild(kpiCard("총 검색어",""+sorted.length,null,"#E2E8F0"));
  g.appendChild(kpiCard("매출 발생",""+profit.length,null,"#10B981"));
  g.appendChild(kpiCard("낭비",""+waste.length,null,"#EF4444"));el.appendChild(g);
  if(profit.length){const c=document.createElement("div");c.className="card";let h=`<div style="font-size:11px;font-weight:700;margin-bottom:6px;color:#10B981">매출 기여 TOP 10</div>`;
    profit.slice(0,10).forEach(s=>{h+=`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:10px"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.query}</span><span style="color:#10B981;font-weight:700;min-width:45px;text-align:right">$${pn(s.sales).toFixed(0)}</span></div>`});
    c.innerHTML=h;el.appendChild(c);}
  if(waste.length){const c=document.createElement("div");c.className="card";let h=`<div style="font-size:11px;font-weight:700;margin-bottom:6px;color:#EF4444">비용 낭비 TOP 10 (네거티브 후보)</div>`;
    waste.slice(0,10).forEach(s=>{h+=`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--bd);font-size:10px"><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.query}</span><span style="color:#EF4444;font-weight:700;min-width:50px;text-align:right">-$${pn(s.cost).toFixed(2)}</span></div>`});
    c.innerHTML=h;el.appendChild(c);}
}

// ── TRAFFIC ──
function renderTraffic(el){
  if(!state.br.length){el.appendChild(emptyCard("👥","트래픽 데이터 대기 중","<b>business_report</b> 탭에 비즈니스 리포트 입력 후 🔄 동기화"));return}
  const by={};state.br.forEach(r=>{if(!r.asin)return;if(!by[r.asin])by[r.asin]={asin:r.asin,title:r.title,sess:0,cvrs:[]};by[r.asin].sess+=pn(r.sessions);if(pn(r.cvr)>0)by[r.asin].cvrs.push(pn(r.cvr))});
  const list=Object.values(by).map(a=>({...a,cvr:a.cvrs.length?a.cvrs.reduce((x,y)=>x+y,0)/a.cvrs.length:0})).sort((a,b)=>b.sess-a.sess).slice(0,12);
  const ts=state.br.reduce((s,r)=>s+pn(r.sessions),0);
  const ac=state.br.filter(r=>pn(r.cvr)>0).map(r=>pn(r.cvr));const avgC=ac.length?ac.reduce((a,b)=>a+b,0)/ac.length:0;
  const g=document.createElement("div");g.className="grid2";
  g.appendChild(kpiCard("세션",ts.toLocaleString(),null,"#3B82F6"));
  g.appendChild(kpiCard("평균 CVR",avgC.toFixed(1)+"%",null,avgC>10?"#10B981":avgC>5?"#F59E0B":"#EF4444"));el.appendChild(g);
  const card=document.createElement("div");card.className="card";let h=`<div style="font-size:11px;font-weight:700;margin-bottom:6px">ASIN별 트래픽 & CVR</div>`;
  list.forEach(a=>{const cc=a.cvr>10?"#10B981":a.cvr>5?"#F59E0B":"#EF4444";
    h+=`<div style="padding:7px 0;border-bottom:1px solid var(--bd)"><div style="display:flex;justify-content:space-between;font-size:10px"><div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${a.title||a.asin}</div><div style="text-align:right;min-width:80px;font-size:9px">세션 <b>${a.sess.toLocaleString()}</b> <span style="color:${cc};font-weight:700">CVR ${a.cvr.toFixed(1)}%</span></div></div><div style="margin-top:3px;height:3px;border-radius:2px;background:rgba(255,255,255,0.05)"><div style="height:100%;width:${Math.min(a.cvr*5,100)}%;border-radius:2px;background:${cc}"></div></div></div>`;
  });card.innerHTML=h;el.appendChild(card);
}

// ── SETTINGS ──
function renderSettings(el){
  const c1=document.createElement("div");c1.className="card";
  let h=`<div style="font-size:13px;font-weight:700;margin-bottom:6px">연결된 구글시트</div>
    <div style="font-size:10px;color:#64748B;margin-bottom:8px;word-break:break-all">ID: ${state.sheetId}</div>`;
  [{n:"campaign",ok:state.sync.campaign,d:"캠페인 광고"},{n:"search_terms",ok:state.sync.search_terms,d:"검색어 보고서"},{n:"business_report",ok:state.sync.business_report,d:"비즈니스 리포트"}].forEach(s=>{
    h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd);font-size:10px"><div><b>${s.n}</b> <span style="color:#64748B">${s.d}</span></div><span class="dot ${s.ok?"ok":"no"}"></span></div>`;
  });
  if(state.lastSync)h+=`<div style="font-size:9px;color:#64748B;margin-top:8px">마지막 동기화: ${state.lastSync}</div>`;
  c1.innerHTML=h;el.appendChild(c1);

  // Debug test
  const c3=document.createElement("div");c3.className="card";
  c3.innerHTML=`<div style="font-size:11px;font-weight:700;margin-bottom:6px">🔧 연결 테스트</div>
    <div style="font-size:10px;color:#64748B;margin-bottom:8px">동기화가 안 될 때 아래 버튼으로 확인하세요</div>`;
  const testBtn=document.createElement("button");testBtn.textContent="연결 테스트 실행";
  testBtn.style.cssText="padding:8px 16px;border-radius:8px;border:1px solid var(--bd);background:rgba(255,255,255,0.04);color:var(--tx);font-size:11px;font-weight:600;width:100%";
  const testResult=document.createElement("div");testResult.style.cssText="margin-top:8px;font-size:10px;line-height:1.6;display:none;padding:10px;border-radius:8px;background:rgba(255,255,255,0.02)";
  testBtn.onclick=async()=>{
    testBtn.disabled=true;testBtn.textContent="테스트 중...";
    testResult.style.display="block";testResult.innerHTML="";
    let log="";
    
    // Test 1: JSONP on default sheet
    log+="<b>1. 기본 시트 접근 (JSONP)...</b><br>";
    const r1=await testSheetAccess(state.sheetId);
    log+=r1?"✅ 성공<br>":"❌ 실패<br>";

    // Test 2: Each tab
    for(const tab of ["campaign","search_terms","business_report"]){
      log+=`<b>2. ${tab} 탭 로드...</b><br>`;
      const rows=await loadSheetJSONP(state.sheetId,tab);
      if(rows&&rows.length>0){
        log+=`✅ ${rows.length}행 로드됨<br>`;
      } else if(rows){
        log+=`⚠️ 탭은 있지만 데이터 0행<br>`;
      } else {
        log+=`❌ 탭을 찾을 수 없음 (탭 이름이 정확히 "${tab}"인지 확인)<br>`;
      }
    }

    // Test 3: Try opening sheet URL directly
    log+=`<br><b>수동 확인:</b><br>`;
    log+=`<a href="https://docs.google.com/spreadsheets/d/${state.sheetId}/gviz/tq?tqx=out:csv" target="_blank" style="color:#3B82F6;text-decoration:underline">이 링크를 클릭해서 CSV가 열리는지 확인</a><br>`;
    log+=`<span style="color:#64748B">(새 탭에서 데이터가 보이면 시트 공유 OK, 로그인 화면이 나오면 공유 설정 필요)</span>`;

    testResult.innerHTML=log;
    testBtn.disabled=false;testBtn.textContent="연결 테스트 실행";
  };
  c3.appendChild(testBtn);c3.appendChild(testResult);el.appendChild(c3);
  
  const c2=document.createElement("div");c2.className="card";c2.style.cssText="background:rgba(16,185,129,0.03);border-color:rgba(16,185,129,0.1)";
  c2.innerHTML=`<div style="font-size:11px;font-weight:700;color:#10B981;margin-bottom:6px">💡 데이터 업데이트 방법</div>
    <div style="font-size:10px;color:#64748B;line-height:1.8">1. 셀러센트럴에서 리포트 CSV 다운로드<br>2. 구글시트 해당 탭에 붙여넣기<br>3. 여기서 <b>🔄 동기화</b> 클릭</div>`;
  el.appendChild(c2);

  // Troubleshooting
  const c4=document.createElement("div");c4.className="card";
  c4.innerHTML=`<div style="font-size:11px;font-weight:700;color:#F59E0B;margin-bottom:6px">⚠ 동기화 안 될 때</div>
    <div style="font-size:10px;color:#64748B;line-height:1.8">
    <b>1. 구글시트 공유 설정</b><br>
    &nbsp;&nbsp;공유 → 일반 액세스 → <b>'링크가 있는 모든 사용자'</b><br><br>
    <b>2. 웹에 게시 (더 확실)</b><br>
    &nbsp;&nbsp;파일 → 공유 → <b>웹에 게시</b> → 게시<br><br>
    <b>3. 탭 이름 확인</b><br>
    &nbsp;&nbsp;정확히 <b>campaign</b>, <b>search_terms</b>, <b>business_report</b><br>
    &nbsp;&nbsp;(대소문자, 공백 주의)<br><br>
    <b>4. 그래도 안 되면</b><br>
    &nbsp;&nbsp;위 연결 테스트의 링크를 클릭하여<br>
    &nbsp;&nbsp;새 탭에서 CSV가 보이는지 확인해주세요.
    </div>`;
  el.appendChild(c4);
  
  const btn=document.createElement("button");btn.textContent="🔌 시트 연결 해제 & 초기화";
  btn.style.cssText="padding:10px;width:100%;border-radius:8px;border:1px solid rgba(239,68,68,0.2);background:transparent;color:#EF4444;font-size:11px;font-weight:600";
  btn.onclick=handleDisconnect;el.appendChild(btn);
}

function showDashboard(){
  document.getElementById("setup").style.display="none";
  document.getElementById("dashboard").style.display="block";
  renderHeader();renderTabs();renderCurrentTab();
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
(function init(){
  const id=LS.get("sheetId","");
  if(id){
    state.sheetId=id;state.ad=LS.get("ad",state.ad);state.kw=LS.get("kw",[]);
    state.st=LS.get("st",[]);state.br=LS.get("br",[]);
    state.sync=LS.get("sync",state.sync);state.lastSync=LS.get("lastSync","");
    showDashboard();
    syncAll(id).then(()=>{renderHeader();renderCurrentTab()});
  } else {
    document.getElementById("setup").style.display="block";
  }
})();
</script>
</body>
</html>
