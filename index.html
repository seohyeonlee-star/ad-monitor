<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>S.H.LEE Ad Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#05080F;--card:rgba(255,255,255,0.025);--bd:rgba(255,255,255,0.06);--tx:#E2E8F0;--mt:#64748B;--ac:#3B82F6;--gn:#10B981;--rd:#EF4444;--or:#F59E0B;--pu:#8B5CF6}
*{box-sizing:border-box;margin:0;padding:0}body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;min-height:100vh;max-width:620px;margin:0 auto;padding:16px 14px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
button{font-family:inherit;cursor:pointer;border:none}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:10px;animation:fadeIn .3s}
.kpi .lb{font-size:9px;color:var(--mt);margin-bottom:2px}.kpi .vl{font-size:19px;font-weight:800;letter-spacing:-0.5px}.kpi .sb{font-size:8px;color:var(--mt);margin-top:1px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
.tabs{display:flex;gap:2px;margin:10px 0;overflow-x:auto;padding-bottom:4px}
.tab{padding:6px 8px;border-radius:7px;font-size:10px;font-weight:600;white-space:nowrap;background:transparent;color:var(--mt);transition:all .15s}.tab.active{background:rgba(59,130,246,0.15);color:var(--ac)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:2px}.dot.ok{background:var(--gn)}.dot.no{background:var(--mt)}
.refresh{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:var(--ac);padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:9px}th{padding:5px 4px;text-align:left;font-size:8px;color:var(--mt);font-weight:600;border-bottom:1px solid var(--bd)}td{padding:6px 4px;border-bottom:1px solid var(--bd)}
.section{display:none}.section.active{display:block}
.setup-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--tx);font-size:13px;font-family:inherit;outline:none;margin-bottom:12px}.setup-input:focus{border-color:var(--ac)}
.connect-btn{width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);color:#fff;font-size:14px;font-weight:700}.connect-btn:disabled{opacity:0.5}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
.chg{display:inline-block;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700}.chg.up{background:rgba(16,185,129,0.1);color:var(--gn)}.chg.down{background:rgba(239,68,68,0.1);color:var(--rd)}
.alert{padding:10px 12px;border-radius:8px;font-size:10px;line-height:1.6;margin-bottom:8px}
.alert.warn{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);color:var(--or)}
.alert.bad{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.15);color:var(--rd)}
.alert.good{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.15);color:var(--gn)}
.camp-card{padding:12px;border-radius:10px;border:1px solid var(--bd);margin-bottom:8px;cursor:pointer;transition:all .15s}.camp-card:hover{border-color:rgba(255,255,255,0.12)}
</style>
</head>
<body>
<div id="setup" style="display:none;max-width:440px;margin:60px auto;padding:0 20px;animation:fadeIn .5s">
  <div style="text-align:center;margin-bottom:24px">
    <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px">📊</div>
    <h1 style="font-size:22px;font-weight:800">S.H.LEE Ad Monitor</h1>
    <p style="color:var(--mt);font-size:13px;margin-top:4px">구글시트 URL을 입력하세요</p>
  </div>
  <input id="sheetInput" class="setup-input" placeholder="https://docs.google.com/spreadsheets/d/...">
  <button id="connectBtn" class="connect-btn" onclick="handleConnect()">구글시트 연결</button>
  <div style="margin-top:24px;padding:16px;background:rgba(255,255,255,0.02);border:1px solid var(--bd);border-radius:10px;font-size:11px;color:var(--mt);line-height:1.8">
    <b style="color:var(--tx)">시트 탭 5개</b><br>
    <b style="color:var(--rd)">매일:</b> <b style="color:var(--tx)">campaign</b> (캠페인CSV) · <b style="color:var(--tx)">business_report</b> (비즈니스리포트)<br>
    <b style="color:var(--or)">주간:</b> <b style="color:var(--tx)">targeting</b> · <b style="color:var(--tx)">search_terms</b> · <b style="color:var(--tx)">purchased_product</b><br>
    <b style="color:var(--or)">파일 → 공유 → 웹에 게시 → 게시</b>
  </div>
</div>

<div id="dashboard" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:13px">📊</div>
      <div><div style="font-size:16px;font-weight:800">S.H.LEE Ad Monitor</div><div id="statusDots" style="font-size:8px;color:var(--mt)"></div></div>
    </div>
    <button class="refresh" onclick="handleRefresh()" id="refreshBtn">🔄 동기화</button>
  </div>
  <div id="lastSyncText" style="font-size:8px;color:var(--mt);text-align:right;margin-bottom:4px"></div>
  <div class="tabs" id="tabBar"></div>
  <div id="sec-overview" class="section"></div>
  <div id="sec-campaign" class="section"></div>
  <div id="sec-search" class="section"></div>
  <div id="sec-product" class="section"></div>
  <div id="sec-crosssell" class="section"></div>
  <div id="sec-ai" class="section"></div>
  <div id="sec-settings" class="section"></div>
</div>

<script>
// ═══ JSONP ═══
function loadSheet(id,tab){return new Promise(res=>{const cb='_c'+Math.random().toString(36).substr(2,8);const s=document.createElement('script');let d=false;
window[cb]=function(r){d=true;delete window[cb];if(s.parentNode)s.remove();res(r&&r.status==='ok'&&r.table?gviz(r.table):null)};
s.src=`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(tab)}`;
s.onerror=()=>{if(!d){d=true;delete window[cb];res(null)}};setTimeout(()=>{if(!d){d=true;delete window[cb];if(s.parentNode)s.remove();res(null)}},12000);document.head.appendChild(s)})}
function gviz(t){if(!t||!t.cols||!t.rows)return[];const h=t.cols.map(c=>(c.label||c.id||'').trim());
return t.rows.map(row=>{const o={};(row.c||[]).forEach((c,i)=>{if(i<h.length)o[h[i]]=c?(c.v!=null?String(c.v):''):''});return o}).filter(o=>Object.values(o).some(v=>v!==''))}

// ═══ STATE ═══
let S={sheetId:"",camp:[],tgt:[],st:[],br:[],pp:[],sync:{campaign:false,targeting:false,search_terms:false,business_report:false,purchased_product:false},lastSync:"",tab:"overview"};
const LS={set(k,v){try{localStorage.setItem("sh_"+k,JSON.stringify(v))}catch(e){}},get(k,d){try{const v=localStorage.getItem("sh_"+k);return v?JSON.parse(v):d}catch(e){return d}},clear(){Object.keys(localStorage).filter(k=>k.startsWith("sh_")).forEach(k=>localStorage.removeItem(k))}};
const pn=s=>{const n=parseFloat(String(s||0).replace(/[,$%]/g,""));return isNaN(n)?0:n};
const sm=a=>a.reduce((x,y)=>x+y,0);const av=a=>a.length?sm(a)/a.length:0;
function fixD(d){const m=String(d).match(/Date\((\d+),(\d+),(\d+)\)/);return m?`${m[1]}-${String(+m[2]+1).padStart(2,'0')}-${m[3].padStart(2,'0')}`:String(d).slice(0,10)}

// ═══ PARSERS (matching actual Amazon report headers) ═══
// campaign tab: from Campaign CSV (State, Campaign name, Status, Type, ...) + Date + Purpose manual
function parseCamp(rows){return rows.map(r=>({
  date:fixD(r["Date"]||""),purpose:r["Purpose"]||r["목적"]||"",
  name:r["Campaign name"]||r["Campaign Name"]||"",
  status:r["Status"]||"",type:r["Type"]||"",
  budget:r["Campaign budget amount"]||r["Campaign budget amount (converted)"]||"",
  timeInBudget:r["Avg. time in budget"]||"",
  acos:pn(r["ACOS"]),roas:pn(r["ROAS"]),
  purchases:pn(r["Purchases"]),sales:pn(r["Sales"]||r["Sales (converted)"]),
  imp:pn(r["Impressions"]),clk:pn(r["Clicks"]),ctr:pn(r["CTR"]),
  cost:pn(r["Total cost"]||r["Total cost (converted)"]),cpc:pn(r["CPC"]||r["CPC (converted)"]),
  tos:r["Top-of-search impression share"]||""
})).filter(r=>r.name)}

// targeting tab: from SP Targeting XLSX
function parseTgt(rows){return rows.map(r=>({
  date:fixD(r["Date"]||""),camp:r["Campaign Name"]||"",adGroup:r["Ad Group Name"]||"",
  kw:r["Targeting"]||"",mt:r["Match Type"]||"",
  imp:pn(r["Impressions"]),tos:r["Top-of-search Impression Share"]||"",
  clk:pn(r["Clicks"]),ctr:pn(r["Click-Thru Rate (CTR)"]),cpc:pn(r["Cost Per Click (CPC)"]),
  spend:pn(r["Spend"]),acos:pn(r["Total Advertising Cost of Sales (ACOS) "]),
  roas:pn(r["Total Return on Advertising Spend (ROAS)"]),
  sales:pn(r["7 Day Total Sales "]),orders:pn(r["7 Day Total Orders (#)"]),
  units:pn(r["7 Day Total Units (#)"]),cvr:pn(r["7 Day Conversion Rate"]),
  advUnits:pn(r["7 Day Advertised SKU Units (#)"]),otherUnits:pn(r["7 Day Other SKU Units (#)"]),
  advSales:pn(r["7 Day Advertised SKU Sales "]),otherSales:pn(r["7 Day Other SKU Sales "])
})).filter(r=>r.kw)}

// search_terms tab: from SP Search Term XLSX
function parseST(rows){return rows.map(r=>({
  date:fixD(r["Date"]||""),camp:r["Campaign Name"]||"",
  kw:r["Targeting"]||"",mt:r["Match Type"]||"",
  query:r["Customer Search Term"]||"",
  imp:pn(r["Impressions"]),clk:pn(r["Clicks"]),spend:pn(r["Spend"]),
  sales:pn(r["7 Day Total Sales "]),orders:pn(r["7 Day Total Orders (#)"]),
  advSales:pn(r["7 Day Advertised SKU Sales "]),otherSales:pn(r["7 Day Other SKU Sales "])
})).filter(r=>r.query)}

// business_report tab: from Business Report CSV (Date manual)
function parseBR(rows){return rows.map(r=>({
  date:fixD(r["Date"]||""),asin:r["(Child) ASIN"]||"",title:r["Title"]||"",
  sessions:pn(r["Sessions - Total"]),pv:pn(r["Page Views - Total"]),
  bbox:pn(r["Featured Offer (Buy Box) Percentage"]),
  units:pn(r["Units Ordered"]),cvr:pn(r["Unit Session Percentage"]),
  sales:pn(r["Ordered Product Sales"])
})).filter(r=>r.asin)}

// purchased_product tab: from 구매한 상품 보고서 (Korean headers)
function parsePP(rows){return rows.map(r=>({
  date:fixD(r["날짜"]||r["Date"]||""),camp:r["캠페인 이름"]||r["Campaign Name"]||"",
  advSku:r["광고된 SKU"]||r["Advertised SKU"]||"",advAsin:r["광고된 ASIN"]||r["Advertised ASIN"]||"",
  kw:r["키워드"]||r["Keyword"]||"",mt:r["일치 유형"]||r["Match Type"]||"",
  purAsin:r["구매한 ASIN"]||r["Purchased ASIN"]||"",
  otherQty:pn(r["7일 기타 SKU 수량(개수)"]||r["7 Day Other SKU Units (#)"]),
  otherOrders:pn(r["7일 기타 SKU 주문(건수)"]||r["7 Day Other SKU Orders (#)"]),
  otherSales:pn(r["7일 기타 SKU 판매 "]||r["7 Day Other SKU Sales "])
})).filter(r=>r.advAsin||r.purAsin)}

// ═══ ANALYSIS ═══
function campByDate(data){const byDate={};data.forEach(r=>{if(!r.date)return;if(!byDate[r.date])byDate[r.date]={date:r.date,cost:0,sales:0,imp:0,clk:0,pur:0,camps:[]};
  byDate[r.date].cost+=r.cost;byDate[r.date].sales+=r.sales;byDate[r.date].imp+=r.imp;byDate[r.date].clk+=r.clk;byDate[r.date].pur+=r.purchases;byDate[r.date].camps.push(r)});
  return Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date))}

function kwTotals(data){const by={};data.forEach(r=>{const k=r.kw+"|"+r.camp;if(!by[k])by[k]={kw:r.kw,camp:r.camp,mt:r.mt,imp:0,clk:0,spend:0,sales:0,orders:0,advSales:0,otherSales:0};
  by[k].imp+=r.imp;by[k].clk+=r.clk;by[k].spend+=r.spend;by[k].sales+=r.sales;by[k].orders+=r.orders;by[k].advSales+=r.advSales;by[k].otherSales+=r.otherSales});
  return Object.values(by).map(k=>({...k,acos:k.sales>0?(k.spend/k.sales*100):0})).sort((a,b)=>b.sales-a.sales)}

function crossSellAnalysis(data){
  const pairs={};data.forEach(r=>{if(!r.advAsin||!r.purAsin)return;
    const key=r.advAsin+"→"+r.purAsin;
    if(!pairs[key])pairs[key]={advAsin:r.advAsin,purAsin:r.purAsin,kws:new Set(),qty:0,orders:0,sales:0};
    if(r.kw)pairs[key].kws.add(r.kw);pairs[key].qty+=r.otherQty;pairs[key].orders+=r.otherOrders;pairs[key].sales+=r.otherSales});
  return Object.values(pairs).filter(p=>p.orders>0||p.qty>0).sort((a,b)=>b.orders-a.orders)}

function asinTraffic(data){const by={};data.forEach(r=>{if(!by[r.asin])by[r.asin]={asin:r.asin,title:r.title,sess:0,units:0,sales:0,cvrs:[],bboxs:[]};
  by[r.asin].sess+=r.sessions;by[r.asin].units+=r.units;by[r.asin].sales+=r.sales;if(r.cvr>0)by[r.asin].cvrs.push(r.cvr);if(r.bbox>0)by[r.asin].bboxs.push(r.bbox)});
  return Object.values(by).map(a=>({...a,cvr:av(a.cvrs),bbox:av(a.bboxs)})).sort((a,b)=>b.sess-a.sess)}

function chgB(v,inv){const val=inv?v*-1:v;if(Math.abs(val)<0.5)return'';return`<span class="chg ${val>0?"up":"down"}">${val>0?"+":""}${val.toFixed(1)}%</span>`}
function pctCh(c,p){return p>0?((c-p)/p*100):0}

// ═══ SYNC ═══
async function syncAll(id){
  const sync={campaign:false,targeting:false,search_terms:false,business_report:false,purchased_product:false};
  const c=await loadSheet(id,"campaign");if(c&&c.length){S.camp=parseCamp(c);LS.set("c",S.camp);sync.campaign=true}
  const t=await loadSheet(id,"targeting");if(t&&t.length){S.tgt=parseTgt(t);LS.set("t",S.tgt);sync.targeting=true}
  const s=await loadSheet(id,"search_terms");if(s&&s.length){S.st=parseST(s);LS.set("s",S.st);sync.search_terms=true}
  const b=await loadSheet(id,"business_report");if(b&&b.length){S.br=parseBR(b);LS.set("b",S.br);sync.business_report=true}
  const p=await loadSheet(id,"purchased_product");if(p&&p.length){S.pp=parsePP(p);LS.set("p",S.pp);sync.purchased_product=true}
  S.sync=sync;S.lastSync=new Date().toLocaleString("ko-KR");LS.set("sync",sync);LS.set("last",S.lastSync);return sync}

// ═══ CONNECT ═══
async function handleConnect(){const url=document.getElementById("sheetInput").value;const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(!m){alert("URL을 정확히 붙여넣어 주세요.");return}const btn=document.getElementById("connectBtn");
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>연결 중...';S.sheetId=m[1];LS.set("id",S.sheetId);
  await syncAll(S.sheetId);btn.disabled=false;btn.textContent="구글시트 연결";showDashboard()}
async function handleRefresh(){const btn=document.getElementById("refreshBtn");
  btn.innerHTML='<span class="spinner" style="width:10px;height:10px;border-width:1.5px"></span>';
  await syncAll(S.sheetId);btn.textContent="🔄 동기화";renderHeader();renderTab()}

// ═══ RENDER ═══
let charts={};function dc(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={}}
function renderHeader(){
  const s=S.sync;document.getElementById("statusDots").innerHTML=
  `<span class="dot ${s.campaign?"ok":"no"}"></span>캠페인 <span class="dot ${s.targeting?"ok":"no"}"></span>키워드 <span class="dot ${s.search_terms?"ok":"no"}"></span>검색어 <span class="dot ${s.business_report?"ok":"no"}"></span>트래픽 <span class="dot ${s.purchased_product?"ok":"no"}"></span>크로스셀`;
  document.getElementById("lastSyncText").textContent=S.lastSync?"마지막: "+S.lastSync:""}
function renderTabs(){const bar=document.getElementById("tabBar");bar.innerHTML="";
  [["overview","🔬 퍼널"],["campaign","📊 캠페인"],["search","🔍 검색어"],["product","👥 상품"],["crosssell","🔀 크로스셀"],["ai","🤖 AI"],["settings","⚙️"]].forEach(([id,l])=>{
  const b=document.createElement("button");b.className="tab"+(S.tab===id?" active":"");b.textContent=l;
  b.onclick=()=>{S.tab=id;renderTabs();renderTab()};bar.appendChild(b)})}
function renderTab(){dc();document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  const el=document.getElementById("sec-"+S.tab);if(!el)return;el.classList.add("active");el.innerHTML="";
  ({overview:rOverview,campaign:rCampaign,search:rSearch,product:rProduct,crosssell:rCrossSell,ai:rAi,settings:rSettings})[S.tab]?.(el)}
function kpi(l,v,sub,c){return`<div class="card kpi"><div class="lb">${l}</div><div class="vl" style="color:${c}">${v}</div>${sub?`<div class="sb">${sub}</div>`:""}</div>`}
function empty(i,t,d){return`<div class="card" style="text-align:center;padding:28px"><div style="font-size:24px;margin-bottom:8px">${i}</div><div style="font-size:12px;font-weight:700;margin-bottom:6px">${t}</div><div style="font-size:10px;color:var(--mt);line-height:1.6">${d}</div></div>`}

const PURPOSE_L={launch:{l:"🚀런칭",c:"#8B5CF6"},bestseller:{l:"👑베셀",c:"#F59E0B"},clearance:{l:"🏷️정리",c:"#EC4899"},conquest:{l:"🎯공략",c:"#06B6D4"},seasonal:{l:"📅시즌",c:"#F97316"},defense:{l:"🛡️방어",c:"#3B82F6"}};

// ═══ TAB: Overview (ASIN Spotlight + Funnel) ═══
let selAsin="";
function rOverview(el){
  if(!S.br.length&&!S.camp.length){el.innerHTML=empty("🔬","퍼널 진단","campaign 또는 business_report 탭 데이터 동기화 필요");return}
  const asins=asinTraffic(S.br);const daily=campByDate(S.camp);
  const latest=daily.length?daily[daily.length-1]:null;const prev=daily.length>1?daily[daily.length-2]:null;
  const tCost=sm(S.camp.map(r=>r.cost)),tSales=sm(S.camp.map(r=>r.sales)),tPur=sm(S.camp.map(r=>r.purchases));
  const acos=tSales>0?(tCost/tSales*100):0;
  const budgetIssues=S.camp.filter(r=>r.status.includes("BUDGET")).length;
  const crossPairs=crossSellAnalysis(S.pp);
  let html="";
  if(latest&&prev){html+=`<div class="card"><div style="font-size:11px;font-weight:700;margin-bottom:8px">전일 대비 (${latest.date})</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:10px">
    <div>매출 $${latest.sales.toFixed(0)} ${chgB(pctCh(latest.sales,prev.sales))}</div>
    <div>광고비 $${latest.cost.toFixed(0)} ${chgB(pctCh(latest.cost,prev.cost))}</div>
    <div>구매 ${latest.pur}건 ${chgB(pctCh(latest.pur,prev.pur))}</div></div></div>`}
  if(budgetIssues>0)html+=`<div class="alert warn">⚠ ${budgetIssues}개 캠페인 예산 소진</div>`;
  if(crossPairs.length>0)html+=`<div class="alert good">💡 크로스셀 ${crossPairs.length}건 → 크로스셀 탭</div>`;
  html+=`<div class="g2">${kpi("광고 매출","$"+tSales.toFixed(0),(daily.length||"-")+"일·"+tPur+"건","#10B981")}${kpi("광고비","$"+tCost.toFixed(0),"ACOS "+acos.toFixed(0)+"%",acos>30?"#EF4444":"#10B981")}</div>`;

        </div>
        ${p.kws.size>0?`<div style="font-size:8px;color:var(--mt);margin-top:3px">키워드: ${[...p.kws].slice(0,3).join(", ")}${p.kws.size>3?" 외 "+(p.kws.size-3)+"개":""}</div>`:""}
      </div>`;
    });
    html+=`</div>`;

    html+=`<div class="card" style="background:rgba(139,92,246,0.03);border-color:rgba(139,92,246,0.1)">
      <div style="font-size:11px;font-weight:700;color:#8B5CF6;margin-bottom:6px">💡 크로스셀 활용 방법</div>
      <div style="font-size:10px;color:var(--mt);line-height:1.8">
      • 자주 함께 구매되는 ASIN → <b>번들 상품</b> 만들기<br>
      • 구매 ASIN에 대한 <b>별도 캠페인</b> 생성 (이미 전환 검증됨)<br>
      • 광고 ASIN 페이지에 구매 ASIN을 <b>"함께 구매" 추천</b>으로 노출<br>
      • AI 전략 탭에서 크로스셀 데이터 포함 분석 가능</div></div>`;
  }
  el.innerHTML=html;
}

// ═══ TAB: AI ═══
let aiState={mode:"all",result:"",loading:false};
const AI_MODES={
  all:{label:"📊 종합 분석",color:"#3B82F6",desc:"캠페인별/상품별 구체적 액션 + 크로스셀"},
  new:{label:"🚀 신상품 런칭",color:"#8B5CF6",desc:"노출 확보, 랭킹 진입"},
  best:{label:"👑 베스트셀러 방어",color:"#F59E0B",desc:"ACOS 최적화, 수익 극대화"},
  clearance:{label:"🏷️ 재고 정리",color:"#EC4899",desc:"구형 모델 소진, 손절 판단"},
  conquest:{label:"🎯 경쟁사 공략",color:"#06B6D4",desc:"브랜드/ASIN 타겟"},
  seasonal:{label:"📅 시즌 대비",color:"#F97316",desc:"프라임데이, 블프, iPhone"},
  turnaround:{label:"🔄 적자 전환",color:"#EF4444",desc:"ACOS 100%+ 살릴지 죽일지"},
};

const AI_PROMPT_BASE=`아마존 PPC 전문가로서 분석하세요.

각 캠페인에 purpose(목적) 필드가 있습니다. 목적별 ACOS 기준:
- launch: ACOS 높아도 OK (노출 우선)
- bestseller: ACOS 30% 이하 엄격
- clearance: 회전율 우선
- conquest: ACOS 높은 게 정상
- "미지정": 데이터로 추론 (추론이라고 명시)

또한 "크로스셀 데이터"가 포함되어 있습니다. 광고한 ASIN과 다른 ASIN이 구매된 패턴입니다.
이를 활용해서 번들 상품, 연관 광고 캠페인, 키워드 확장 기회를 제안하세요.

반드시 다음 형식으로 답변 (한국어, 마크다운 없이):

[캠페인별 예산 조정]
- (캠페인명) (목적): 현재 → 권장, 이유

[키워드 입찰 조정]
증액: (키워드) $X → $Y (이유)
감액: (키워드) $X → $Y (이유)
중단: (키워드) (이유)

[새 키워드 추가] 3~5개
- (키워드) / 매치타입 / 시작 입찰가 / 근거

[네거티브 키워드] 검색어 기반
- (검색어): 비용 $X, 전환 0

[크로스셀 기회 활용]
- (광고ASIN → 구매ASIN): 이 패턴을 활용한 구체적 액션

[7일 후 확인 KPI] 2가지`;

async function runAi(){
  if(aiState.loading)return;aiState.loading=true;rAi(document.getElementById("sec-ai"));
  const camps=S.camp.filter(c=>c.date===[...new Set(S.camp.map(r=>r.date))].sort().pop());
  const kws=kwTotals(S.tgt);const pairs=crossSellAnalysis(S.pp);
  const stByQ={};S.st.forEach(s=>{if(!stByQ[s.query])stByQ[s.query]={q:s.query,spend:0,sales:0,clk:0};stByQ[s.query].spend+=s.spend;stByQ[s.query].sales+=s.sales;stByQ[s.query].clk+=s.clk});
  const stWaste=Object.values(stByQ).filter(s=>s.spend>0&&s.sales===0).sort((a,b)=>b.spend-a.spend).slice(0,10);

  const ctx={
    campaigns:camps.map(c=>({name:c.name,purpose:c.purpose||"미지정",type:c.type,status:c.status,budget:c.budget,
      acos:(c.acos*100).toFixed(0)+"%",sales:+c.sales.toFixed(0),cost:+c.cost.toFixed(0),imp:c.imp,clk:c.clk,tos:c.tos})),
    keywords:kws.slice(0,15).map(k=>({keyword:k.kw,campaign:k.camp,matchType:k.mt,impressions:k.imp,clicks:k.clk,
      spend:+k.spend.toFixed(1),sales:+k.sales.toFixed(0),acos:k.acos.toFixed(0)+"%",otherSales:+k.otherSales.toFixed(0)})),
    wasteKeywords:kws.filter(k=>k.clk>=3&&k.sales===0).slice(0,10).map(k=>({kw:k.kw,clk:k.clk,spend:+k.spend.toFixed(1)})),
    wasteSearchTerms:stWaste.map(s=>({query:s.q,clicks:s.clk,spend:+s.spend.toFixed(2)})),
    crossSell:pairs.slice(0,10).map(p=>({advertised:p.advAsin,purchased:p.purAsin,orders:p.orders,sales:+p.sales.toFixed(0),keywords:[...p.kws].slice(0,3)})),
    trafficCVR:S.br.length?av(S.br.filter(r=>r.cvr>0).map(r=>r.cvr)).toFixed(1)+"% avg":"N/A"
  };
  const modeLabel=AI_MODES[aiState.mode].label;
  try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,
      messages:[{role:"user",content:`${modeLabel} 관점에서 분석.\n\n${AI_PROMPT_BASE}\n\n데이터:\n${JSON.stringify(ctx,null,1)}`}]})});
    const d=await r.json();aiState.result=d.content?.map(c=>c.text||"").join("")||"실패";
  }catch(e){aiState.result="오류: "+e.message}
  aiState.loading=false;LS.set("aiR",aiState.result);LS.set("aiM",aiState.mode);rAi(document.getElementById("sec-ai"));
}

function rAi(el){if(!el)return;
  let html=`<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px">전략 유형</div><div style="display:flex;flex-direction:column;gap:5px">`;
  Object.entries(AI_MODES).forEach(([k,m])=>{const sel=aiState.mode===k;
    html+=`<div style="padding:9px;border-radius:8px;border:2px solid ${sel?m.color:"var(--bd)"};background:${sel?m.color+"15":"transparent"};cursor:pointer"
      onclick="aiState.mode='${k}';rAi(document.getElementById('sec-ai'))">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:11px;font-weight:700;color:${sel?m.color:"var(--tx)"}">${m.label}</div>
          <div style="font-size:9px;color:var(--mt)">${m.desc}</div></div>
        <div style="width:14px;height:14px;border-radius:50%;border:2px solid ${sel?m.color:"var(--bd)"};display:flex;align-items:center;justify-content:center">
          ${sel?`<div style="width:7px;height:7px;border-radius:50%;background:${m.color}"></div>`:""}</div></div></div>`});
  html+=`</div></div>`;
  const mode=AI_MODES[aiState.mode];const has=S.camp.length>0;
  html+=`<div class="card"><button onclick="runAi()" ${!has||aiState.loading?"disabled":""} style="width:100%;padding:12px;border-radius:10px;border:none;
    background:linear-gradient(135deg,${mode.color},${mode.color}99);color:#fff;font-size:13px;font-weight:700;opacity:${has?1:.5}">
    ${aiState.loading?'<span class="spinner"></span>분석 중...':'🤖 '+mode.label+' 분석'}</button></div>`;
  if(aiState.result)html+=`<div class="card" style="border-color:${mode.color}20">
    <div style="font-size:12px;font-weight:700;color:${mode.color};margin-bottom:8px">${mode.label} 결과</div>
    <div style="font-size:11px;color:#CBD5E1;line-height:1.8;white-space:pre-wrap">${aiState.result}</div></div>`;
  el.innerHTML=html;
}

    &nbsp;&nbsp;→ A열 Date 수동 입력 후 B열부터 붙여넣기</div></div>`;

  html+=`<div class="card" style="background:rgba(245,158,11,0.03);border-color:rgba(245,158,11,0.1)">
    <div style="font-size:11px;font-weight:700;color:#F59E0B;margin-bottom:6px">📋 주간 5분 루틴 (3개 탭)</div>
    <div style="font-size:10px;color:#64748B;line-height:1.8">
    <b>targeting:</b> 광고 → 리포트 → SP Targeting (Daily) → 관련 캠페인 필터 → 붙여넣기<br>
    <b>search_terms:</b> 광고 → 리포트 → SP Search Term (Daily) → 관련 캠페인 필터<br>
    <b>purchased_product:</b> 광고 → 리포트 → SP 구매한상품 → 관련 캠페인 필터</div></div>`;

  html+=`<div class="card"><div style="font-size:11px;font-weight:700;color:#8B5CF6;margin-bottom:6px">🎯 Purpose(목적) 값</div>
    <div style="font-size:10px;color:#64748B;line-height:1.6">campaign 탭 B열에 입력: launch / bestseller / clearance / conquest / seasonal / defense</div></div>`;

  el.innerHTML=html;
