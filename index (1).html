<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>S.H.LEE Ad Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#05080F;--card:rgba(255,255,255,0.025);--bd:rgba(255,255,255,0.06);--tx:#E2E8F0;--mt:#64748B;--ac:#3B82F6;--gn:#10B981;--rd:#EF4444;--or:#F59E0B}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;min-height:100vh;max-width:620px;margin:0 auto;padding:16px 14px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
button{font-family:inherit;cursor:pointer;border:none}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:10px;animation:fadeIn .3s}
.kpi .lb{font-size:9px;color:var(--mt);margin-bottom:2px}.kpi .vl{font-size:20px;font-weight:800;letter-spacing:-0.5px}.kpi .sb{font-size:8px;color:var(--mt);margin-top:1px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px}
.tabs{display:flex;gap:2px;margin:10px 0;overflow-x:auto;padding-bottom:4px}
.tab{padding:6px 10px;border-radius:7px;font-size:10px;font-weight:600;white-space:nowrap;background:transparent;color:var(--mt);transition:all .15s}
.tab.active{background:rgba(59,130,246,0.15);color:var(--ac)}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:2px}.dot.ok{background:var(--gn)}.dot.no{background:var(--mt)}
.refresh{background:rgba(59,130,246,0.1);border:1px solid rgba(59,130,246,0.2);color:var(--ac);padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:9px}th{padding:5px 4px;text-align:left;font-size:8px;color:var(--mt);font-weight:600;border-bottom:1px solid var(--bd)}td{padding:6px 4px;border-bottom:1px solid var(--bd)}
.section{display:none}.section.active{display:block}
.setup-input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);color:var(--tx);font-size:13px;font-family:inherit;outline:none;margin-bottom:12px}.setup-input:focus{border-color:var(--ac)}
.connect-btn{width:100%;padding:14px;border-radius:10px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);color:#fff;font-size:14px;font-weight:700}.connect-btn:disabled{opacity:0.5}
.spinner{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;display:inline-block;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
.pill{font-weight:700;font-size:10px}.up{color:var(--gn)}.down{color:var(--rd)}.flat{color:var(--mt)}
.chg{display:inline-block;padding:1px 5px;border-radius:4px;font-size:9px;font-weight:700}
.chg.up{background:rgba(16,185,129,0.1);color:var(--gn)}.chg.down{background:rgba(239,68,68,0.1);color:var(--rd)}
</style>
</head>
<body>

<div id="setup" style="display:none;max-width:440px;margin:60px auto;padding:0 20px;animation:fadeIn .5s">
  <div style="text-align:center;margin-bottom:24px">
    <div style="width:48px;height:48px;border-radius:14px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:inline-flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:12px">📊</div>
    <h1 style="font-size:22px;font-weight:800">S.H.LEE Ad Monitor</h1>
    <p style="color:var(--mt);font-size:13px;margin-top:4px">구글시트 URL을 입력하세요</p>
  </div>
  <input id="sheetInput" class="setup-input" placeholder="https://docs.google.com/spreadsheets/d/...">
  <button id="connectBtn" class="connect-btn" onclick="handleConnect()">구글시트 연결</button>
  <div style="margin-top:24px;padding:16px;background:rgba(255,255,255,0.02);border:1px solid var(--bd);border-radius:10px;font-size:11px;color:var(--mt);line-height:1.8">
    <b style="color:var(--tx)">시트 준비</b><br><br>
    1. 템플릿 엑셀을 구글 드라이브에 업로드 → 스프레드시트로 열기<br>
    2. <b style="color:var(--or)">파일 → 공유 → 웹에 게시 → 게시</b><br>
    3. 위에 URL 붙여넣기 → 연결<br><br>
    탭: <b style="color:var(--tx)">campaign</b>, <b style="color:var(--tx)">search_terms</b>, <b style="color:var(--tx)">business_report</b><br>
    각 탭에 날짜별 데이터를 아래로 누적합니다.
  </div>
</div>

<div id="dashboard" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
    <div style="display:flex;align-items:center;gap:8px">
      <div style="width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);display:flex;align-items:center;justify-content:center;font-size:13px">📊</div>
      <div>
        <div style="font-size:16px;font-weight:800">S.H.LEE Ad Monitor</div>
        <div id="statusDots" style="font-size:8px;color:var(--mt)"></div>
      </div>
    </div>
    <button class="refresh" onclick="handleRefresh()" id="refreshBtn">🔄 동기화</button>
  </div>
  <div id="lastSyncText" style="font-size:8px;color:var(--mt);text-align:right;margin-bottom:4px"></div>
  <div class="tabs" id="tabBar"></div>
  <div id="sec-sales" class="section"></div>
  <div id="sec-keywords" class="section"></div>
  <div id="sec-search" class="section"></div>
  <div id="sec-traffic" class="section"></div>
  <div id="sec-ai" class="section"></div>
  <div id="sec-settings" class="section"></div>
</div>

<script>
// ═══ JSONP (bypasses CORS for file:// and https://) ═══
function loadSheet(sheetId,tabName){
  return new Promise(resolve=>{
    const cb='_cb_'+Math.random().toString(36).substr(2,8);
    const s=document.createElement('script');let done=false;
    window[cb]=function(r){done=true;delete window[cb];if(s.parentNode)s.remove();
      resolve(r&&r.status==='ok'&&r.table?gvizToRows(r.table):null)};
    s.src=`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=responseHandler:${cb}&sheet=${encodeURIComponent(tabName)}`;
    s.onerror=()=>{if(!done){done=true;delete window[cb];resolve(null)}};
    setTimeout(()=>{if(!done){done=true;delete window[cb];if(s.parentNode)s.remove();resolve(null)}},10000);
    document.head.appendChild(s);
  });
}
function gvizToRows(t){
  if(!t||!t.cols||!t.rows)return[];
  const h=t.cols.map(c=>(c.label||c.id||'').trim());
  return t.rows.map(row=>{const o={};(row.c||[]).forEach((c,i)=>{if(i<h.length)o[h[i]]=c?(c.v!=null?String(c.v):''):''});return o}).filter(o=>Object.values(o).some(v=>v!==''));
}

// ═══ STATE ═══
let S={sheetId:"",campaign:[],searchTerms:[],bizReport:[],sync:{campaign:false,search_terms:false,business_report:false},lastSync:"",tab:"sales"};
const LS={set(k,v){try{localStorage.setItem("sh_"+k,JSON.stringify(v))}catch(e){}},get(k,d){try{const v=localStorage.getItem("sh_"+k);return v?JSON.parse(v):d}catch(e){return d}},clear(){Object.keys(localStorage).filter(k=>k.startsWith("sh_")).forEach(k=>localStorage.removeItem(k))}};
const pn=s=>{const n=parseFloat(String(s||0).replace(/[,$%]/g,""));return isNaN(n)?0:n};
const sm=a=>a.reduce((x,y)=>x+y,0);

// ═══ PARSERS (date-based rows) ═══
function parseCampaign(rows){
  return rows.map(r=>{
    let dt=r["Date"]||"";
    // Handle Google Sheets date format "Date(2026,3,14)" -> "2026-04-14"
    const dm=dt.match(/Date\((\d+),(\d+),(\d+)\)/);
    if(dm) dt=`${dm[1]}-${String(+dm[2]+1).padStart(2,'0')}-${dm[3].padStart(2,'0')}`;
    return{date:dt,kw:r["Keyword"]||"",mt:r["Target match type"]||r["Match Type"]||"",
    bid:pn(r["Bid (USD)"]||r["Bid"]),sug:pn(r["Suggested bid (median)(USD)"]||r["Suggested Bid"]),
    imp:pn(r["Impressions"]),clk:pn(r["Clicks"]),cost:pn(r["Total cost (USD)"]||r["Spend"]),
    pur:pn(r["Purchases"]||r["Orders"]),sales:pn(r["Sales (USD)"]||r["Sales"]),status:r["Status"]||""};
  }).filter(r=>r.kw);
}
function parseST(rows){
  return rows.map(r=>{
    let dt=r["Date"]||"";const dm=dt.match(/Date\((\d+),(\d+),(\d+)\)/);
    if(dm) dt=`${dm[1]}-${String(+dm[2]+1).padStart(2,'0')}-${dm[3].padStart(2,'0')}`;
    return{date:dt,query:r["Customer Search Term"]||r["Search Term"]||"",
    imp:pn(r["Impressions"]),clk:pn(r["Clicks"]),cost:pn(r["Spend"]||r["Total cost (USD)"]),
    sales:pn(r["7 Day Total Sales"]||r["Sales"]),orders:pn(r["7 Day Total Orders"]||r["Orders"])};
  }).filter(r=>r.query);
}
function parseBR(rows){
  return rows.map(r=>{
    let dt=r["Date"]||"";const dm=dt.match(/Date\((\d+),(\d+),(\d+)\)/);
    if(dm) dt=`${dm[1]}-${String(+dm[2]+1).padStart(2,'0')}-${dm[3].padStart(2,'0')}`;
    return{date:dt,asin:r["(Child) ASIN"]||r["ASIN"]||"",title:r["Title"]||"",
    sessions:pn(r["Sessions"]||r["Sessions - Total"]),units:pn(r["Units Ordered"]||r["Units Ordered - Total"]),
    sales:pn(r["Ordered Product Sales"]),cvr:pn(r["Unit Session Percentage"]||r["Unit Session Percentage - Total"])};
  }).filter(r=>r.asin);
}

// ═══ ANALYSIS HELPERS ═══
function dailyAdMetrics(data){
  const byDate={};
  data.forEach(r=>{
    if(!r.date)return;
    if(!byDate[r.date])byDate[r.date]={date:r.date,cost:0,sales:0,imp:0,clk:0,pur:0};
    byDate[r.date].cost+=r.cost;byDate[r.date].sales+=r.sales;
    byDate[r.date].imp+=r.imp;byDate[r.date].clk+=r.clk;byDate[r.date].pur+=r.pur;
  });
  return Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date)).map(d=>({
    ...d,acos:d.sales>0?(d.cost/d.sales*100):0,roas:d.cost>0?(d.sales/d.cost):0,
    ctr:d.imp>0?(d.clk/d.imp*100):0
  }));
}
function kwTotals(data){
  const byKw={};
  data.forEach(r=>{
    if(!byKw[r.kw])byKw[r.kw]={kw:r.kw,mt:r.mt,bid:r.bid,sug:r.sug,imp:0,clk:0,cost:0,pur:0,sales:0,days:0};
    byKw[r.kw].imp+=r.imp;byKw[r.kw].clk+=r.clk;byKw[r.kw].cost+=r.cost;
    byKw[r.kw].pur+=r.pur;byKw[r.kw].sales+=r.sales;byKw[r.kw].days++;
    byKw[r.kw].bid=r.bid;byKw[r.kw].sug=r.sug;
  });
  return Object.values(byKw).map(k=>({...k,acos:k.sales>0?(k.cost/k.sales*100):0})).sort((a,b)=>b.sales-a.sales);
}
function pctChange(cur,prev){return prev>0?((cur-prev)/prev*100):0}
function changeBadge(val){
  if(val===0)return'';
  const cls=val>0?'up':'down';
  return `<span class="chg ${cls}">${val>0?'+':''}${val.toFixed(1)}%</span>`;
}

// ═══ SYNC ═══
async function syncAll(id){
  const sync={campaign:false,search_terms:false,business_report:false};
  const c=await loadSheet(id,"campaign");
  if(c&&c.length){S.campaign=parseCampaign(c);LS.set("c",S.campaign);sync.campaign=true}
  const s=await loadSheet(id,"search_terms");
  if(s&&s.length){S.searchTerms=parseST(s);LS.set("s",S.searchTerms);sync.search_terms=true}
  const b=await loadSheet(id,"business_report");
  if(b&&b.length){S.bizReport=parseBR(b);LS.set("b",S.bizReport);sync.business_report=true}
  S.sync=sync;S.lastSync=new Date().toLocaleString("ko-KR");
  LS.set("sync",sync);LS.set("last",S.lastSync);return sync;
}

// ═══ CONNECT ═══
async function handleConnect(){
  const url=document.getElementById("sheetInput").value;
  const m=url.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(!m){alert("구글시트 URL을 정확히 붙여넣어 주세요.");return}
  const btn=document.getElementById("connectBtn");
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>연결 중...';
  S.sheetId=m[1];LS.set("id",S.sheetId);
  await syncAll(S.sheetId);
  btn.disabled=false;btn.textContent="구글시트 연결";
  showDashboard();
}
async function handleRefresh(){
  const btn=document.getElementById("refreshBtn");
  btn.innerHTML='<span class="spinner" style="width:10px;height:10px;border-width:1.5px"></span>';
  await syncAll(S.sheetId);btn.textContent="🔄 동기화";
  renderHeader();renderTab();
}

// ═══ RENDER ═══
let charts={};
function destroyCharts(){Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});charts={}}

function renderHeader(){
  document.getElementById("statusDots").innerHTML=
    `<span class="dot ${S.sync.campaign?"ok":"no"}"></span>캠페인 `+
    `<span class="dot ${S.sync.search_terms?"ok":"no"}"></span>검색어 `+
    `<span class="dot ${S.sync.business_report?"ok":"no"}"></span>트래픽`;
  document.getElementById("lastSyncText").textContent=S.lastSync?"마지막: "+S.lastSync:"";
}
function renderTabs(){
  const bar=document.getElementById("tabBar");bar.innerHTML="";
  [["sales","📈 광고 성과"],["keywords","🔑 키워드"],["search","🔍 검색어"],["traffic","👥 트래픽"],["ai","🤖 AI 전략"],["settings","⚙️ 설정"]].forEach(([id,l])=>{
    const b=document.createElement("button");b.className="tab"+(S.tab===id?" active":"");b.textContent=l;
    b.onclick=()=>{S.tab=id;renderTabs();renderTab()};bar.appendChild(b);
  });
}
function renderTab(){
  destroyCharts();
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  const el=document.getElementById("sec-"+S.tab);if(!el)return;
  el.classList.add("active");el.innerHTML="";
  ({sales:renderSales,keywords:renderKeywords,search:renderSearch,traffic:renderTraffic,ai:renderAi,settings:renderSettings})[S.tab]?.(el);
}
function kpi(l,v,sub,color){
  return `<div class="card kpi"><div class="lb">${l}</div><div class="vl" style="color:${color}">${v}</div>${sub?`<div class="sb">${sub}</div>`:""}</div>`;
}
function empty(icon,title,desc){
  return `<div class="card" style="text-align:center;padding:28px"><div style="font-size:24px;margin-bottom:8px">${icon}</div><div style="font-size:12px;font-weight:700;margin-bottom:6px">${title}</div><div style="font-size:10px;color:var(--mt);line-height:1.6">${desc}</div></div>`;
}

// ── SALES TAB (daily ad performance) ──
function renderSales(el){
  if(!S.campaign.length){el.innerHTML=empty("📈","광고 데이터 대기 중","campaign 탭에 날짜별 데이터를 넣고 🔄 동기화");return}
  
  const daily=dailyAdMetrics(S.campaign);
  const totalCost=sm(daily.map(d=>d.cost)),totalSales=sm(daily.map(d=>d.sales));
  const totalPur=sm(daily.map(d=>d.pur)),totalClk=sm(daily.map(d=>d.clk)),totalImp=sm(daily.map(d=>d.imp));
  const acos=totalSales>0?(totalCost/totalSales*100):0;
  const roas=totalCost>0?(totalSales/totalCost):0;

  // Day-over-day change
  let dodHtml="";
  if(daily.length>=2){
    const today=daily[daily.length-1],yest=daily[daily.length-2];
    dodHtml=`<div class="card"><div style="font-size:11px;font-weight:700;margin-bottom:8px">전일 대비 변화 (${today.date})</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:10px">
      <div>매출 $${today.sales.toFixed(0)} ${changeBadge(pctChange(today.sales,yest.sales))}</div>
      <div>광고비 $${today.cost.toFixed(0)} ${changeBadge(pctChange(today.cost,yest.cost))}</div>
      <div>ACOS ${today.acos.toFixed(0)}% ${changeBadge(pctChange(today.acos,yest.acos)*-1)}</div>
      <div>클릭 ${today.clk} ${changeBadge(pctChange(today.clk,yest.clk))}</div>
      <div>노출 ${today.imp.toLocaleString()} ${changeBadge(pctChange(today.imp,yest.imp))}</div>
      <div>구매 ${today.pur} ${changeBadge(pctChange(today.pur,yest.pur))}</div>
      </div></div>`;
  }

  el.innerHTML=`
    <div class="g2">
      ${kpi("총 광고 매출","$"+totalSales.toFixed(0),totalPur+"건 · "+daily.length+"일간","#10B981")}
      ${kpi("총 광고비","$"+totalCost.toFixed(0),totalClk+"클릭","#F59E0B")}
      ${kpi("ACOS",acos.toFixed(1)+"%",acos>30?"목표 30% 초과":"양호",acos>30?"#EF4444":"#10B981")}
      ${kpi("ROAS",roas.toFixed(2)+"x",roas<3?"목표 3x 미달":"양호",roas<3?"#F59E0B":"#10B981")}
    </div>
    ${dodHtml}
    <div class="card"><div style="font-size:12px;font-weight:700;margin-bottom:10px">일별 광고 매출 & 광고비</div>
      <canvas id="chartSales" style="height:160px;width:100%"></canvas></div>
    <div class="card"><div style="font-size:12px;font-weight:700;margin-bottom:10px">일별 ACOS 추이</div>
      <canvas id="chartAcos" style="height:120px;width:100%"></canvas></div>`;

  setTimeout(()=>{
    const labels=daily.map(d=>d.date.slice(5));
    charts.sales=new Chart(document.getElementById("chartSales"),{type:"bar",
      data:{labels,datasets:[
        {label:"매출",data:daily.map(d=>d.sales),backgroundColor:"rgba(16,185,129,0.6)",borderRadius:3,order:2},
        {label:"광고비",data:daily.map(d=>d.cost),backgroundColor:"rgba(245,158,11,0.6)",borderRadius:3,order:2},
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#94A3B8",font:{size:9}}}},
        scales:{x:{ticks:{font:{size:7},color:"#64748B",maxRotation:45},grid:{display:false}},y:{ticks:{font:{size:8},color:"#64748B"},grid:{color:"rgba(255,255,255,0.03)"}}}}});
    charts.acos=new Chart(document.getElementById("chartAcos"),{type:"line",
      data:{labels,datasets:[
        {label:"ACOS %",data:daily.map(d=>d.acos),borderColor:"#EF4444",backgroundColor:"rgba(239,68,68,0.1)",fill:true,tension:.3,borderWidth:2},
        {label:"목표 30%",data:daily.map(()=>30),borderColor:"rgba(255,255,255,0.15)",borderDash:[4,4],borderWidth:1,pointRadius:0},
      ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:"#94A3B8",font:{size:9}}}},
        scales:{x:{ticks:{font:{size:7},color:"#64748B",maxRotation:45},grid:{display:false}},y:{ticks:{font:{size:8},color:"#64748B"},grid:{color:"rgba(255,255,255,0.03)"}}}}});
  },50);
}

// ── KEYWORDS TAB ──
function renderKeywords(el){
  if(!S.campaign.length){el.innerHTML=empty("🔑","키워드 데이터 대기 중","campaign 탭에 데이터 입력 후 🔄 동기화");return}
  const kws=kwTotals(S.campaign);
  const totalDays=[...new Set(S.campaign.map(r=>r.date))].length;

  let rows="";
  kws.forEach(k=>{
    const low=k.bid<k.sug*0.7;
    const bg=k.sales>0?"rgba(16,185,129,0.03)":k.imp===0?"rgba(239,68,68,0.03)":"";
    const ac=k.acos>100?"#EF4444":k.acos>30?"#F59E0B":k.acos>0?"#10B981":"#64748B";
    rows+=`<tr style="background:${bg}">
      <td style="font-weight:500;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${k.kw}</td>
      <td style="color:#64748B">${(k.mt||"-")[0]}</td>
      <td style="color:${low?"#F59E0B":"#E2E8F0"};font-weight:${low?700:400}">${k.bid||"-"}</td>
      <td style="color:#64748B">${k.sug||"-"}</td>
      <td>${k.imp>0?k.imp.toLocaleString():"-"}</td><td>${k.clk||"-"}</td>
      <td style="color:${k.pur>0?"#10B981":"#64748B"};font-weight:700">${k.pur||"-"}</td>
      <td style="font-weight:600;color:${ac}">${k.acos>0?k.acos.toFixed(0)+"%":"-"}</td></tr>`;
  });

  el.innerHTML=`<div class="card">

    html+=`<div class="card"><div style="font-size:11px;font-weight:700;margin-bottom:6px;color:#EF4444">비용 낭비 TOP 10 (네거티브 후보)</div>`;

function renderTraffic(el){
  if(!S.bizReport.length){el.innerHTML=empty("👥","트래픽 데이터 대기 중","business_report 탭에 데이터 입력 후 🔄 동기화");return}
  // Daily totals
  const byDate={};
  S.bizReport.forEach(r=>{if(!r.date)return;if(!byDate[r.date])byDate[r.date]={date:r.date,sess:0,units:0};
    byDate[r.date].sess+=pn(r.sessions);byDate[r.date].units+=pn(r.units)});
  const daily=Object.values(byDate).sort((a,b)=>a.date.localeCompare(b.date));
  const totalSess=sm(daily.map(d=>d.sess));
  const allCvr=S.bizReport.filter(r=>pn(r.cvr)>0).map(r=>pn(r.cvr));
  const avgCVR=allCvr.length?sm(allCvr)/allCvr.length:0;

  // By ASIN
  const byA={};
  S.bizReport.forEach(r=>{if(!r.asin)return;if(!byA[r.asin])byA[r.asin]={asin:r.asin,title:r.title,sess:0,units:0,cvrs:[]};
    byA[r.asin].sess+=pn(r.sessions);byA[r.asin].units+=pn(r.units);if(pn(r.cvr)>0)byA[r.asin].cvrs.push(pn(r.cvr))});
  const list=Object.values(byA).map(a=>({...a,cvr:a.cvrs.length?sm(a.cvrs)/a.cvrs.length:0})).sort((a,b)=>b.sess-a.sess).slice(0,12);

  let html=`<div class="g2">
    ${kpi("총 세션",totalSess.toLocaleString(),daily.length+"일간","#3B82F6")}
    ${kpi("평균 CVR",avgCVR.toFixed(1)+"%","",avgCVR>10?"#10B981":avgCVR>5?"#F59E0B":"#EF4444")}</div>`;

  html+=`<div class="card"><div style="font-size:12px;font-weight:700;margin-bottom:10px">일별 세션</div><canvas id="chartSess" style="height:120px;width:100%"></canvas></div>`;

  html+=`<div class="card"><div style="font-size:11px;font-weight:700;margin-bottom:6px">ASIN별 트래픽 & CVR</div>`;
  list.forEach(a=>{
    const cc=a.cvr>10?"#10B981":a.cvr>5?"#F59E0B":"#EF4444";
    html+=`<div style="padding:7px 0;border-bottom:1px solid var(--bd)"><div style="display:flex;justify-content:space-between;font-size:10px"><div style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500">${a.title||a.asin}</div><div style="text-align:right;min-width:80px;font-size:9px">세션 <b>${a.sess.toLocaleString()}</b> <span style="color:${cc};font-weight:700">CVR ${a.cvr.toFixed(1)}%</span></div></div><div style="margin-top:3px;height:3px;border-radius:2px;background:rgba(255,255,255,0.05)"><div style="height:100%;width:${Math.min(a.cvr*5,100)}%;border-radius:2px;background:${cc}"></div></div></div>`;
  });html+=`</div>`;
  el.innerHTML=html;

  if(daily.length){setTimeout(()=>{
    charts.sess=new Chart(document.getElementById("chartSess"),{type:"bar",
      data:{labels:daily.map(d=>d.date.slice(5)),datasets:[{label:"세션",data:daily.map(d=>d.sess),backgroundColor:"rgba(59,130,246,0.6)",borderRadius:3}]},

  },50);}
}

    zeroSalesKeywords:kws.filter(k=>k.clk>0&&k.sales===0).map(k=>({keyword:k.kw,clicks:k.clk,cost:k.cost.toFixed(1)})),
    budgetIssues:kws.filter(k=>k.imp===0||S.campaign.some(r=>r.kw===k.kw&&r.status.includes("BUDGET"))).length,
    hasSearchTerms:S.searchTerms.length>0,
    searchTermSummary:S.searchTerms.length?{
      total:new Set(S.searchTerms.map(s=>s.query)).size,
      profitable:S.searchTerms.filter(s=>pn(s.sales)>0).length,
      wasteful:S.searchTerms.filter(s=>pn(s.cost)>0&&pn(s.sales)===0).length,
    }:null,
    hasBizReport:S.bizReport.length>0,
    bizSummary:S.bizReport.length?{
      avgCVR:(S.bizReport.filter(r=>pn(r.cvr)>0).reduce((s,r)=>s+pn(r.cvr),0)/S.bizReport.filter(r=>pn(r.cvr)>0).length).toFixed(1)+"%",
      totalSessions:sm(S.bizReport.map(r=>pn(r.sessions))),
    }:null,
  };

  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1500,
        messages:[{role:"user",content:mode.prompt+"\n\n데이터:\n"+JSON.stringify(ctx,null,1)}]})});
    const d=await r.json();
    aiState.result=d.content?.map(c=>c.text||"").join("")||"분석을 완료할 수 없습니다.";
  }catch(e){aiState.result="API 오류: "+e.message;}
  
  aiState.loading=false;
  LS.set("aiResult",aiState.result);LS.set("aiMode",aiState.mode);
  renderAi(document.getElementById("sec-ai"));
}

function renderAi(el){
  if(!el)return;el.innerHTML="";

  // Strategy selector
  let html=`<div class="card">
    <div style="font-size:13px;font-weight:700;margin-bottom:10px">광고 전략 유형 선택</div>
    <div style="display:flex;flex-direction:column;gap:8px">`;
  
  Object.entries(AI_MODES).forEach(([key,m])=>{
    const selected=aiState.mode===key;
    html+=`<div id="mode-${key}" style="padding:12px;border-radius:10px;border:2px solid ${selected?m.color:"var(--bd)"};
      background:${selected?m.color+"15":"transparent"};cursor:pointer;transition:all .15s"
      onclick="aiState.mode='${key}';renderAi(document.getElementById('sec-ai'))">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:12px;font-weight:700;color:${selected?m.color:"var(--tx)"}">${m.label}</div>
          <div style="font-size:9px;color:var(--mt);margin-top:2px">${m.desc}</div>
        </div>
        <div style="width:18px;height:18px;border-radius:50%;border:2px solid ${selected?m.color:"var(--bd)"};
          display:flex;align-items:center;justify-content:center">
          ${selected?`<div style="width:10px;height:10px;border-radius:50%;background:${m.color}"></div>`:""}
        </div>
      </div>
    </div>`;
  });
  html+=`</div></div>`;

  // Info card for selected mode
  const mode=AI_MODES[aiState.mode];
  html+=`<div class="card" style="border-color:${mode.color}30">
    <div style="font-size:11px;font-weight:700;color:${mode.color};margin-bottom:4px">${mode.label} 분석 관점</div>
    <div style="font-size:10px;color:var(--mt);line-height:1.6">`;
  if(aiState.mode==="new"){
    html+=`• ACOS가 높아도 노출/클릭 볼륨이 충분한지 확인<br>
      • 핵심 키워드에서 Top-of-Search 점유율 확보 전략<br>
      • 초기 판매 속도를 높이기 위한 입찰가/예산 제안`;
  } else if(aiState.mode==="best"){
    html+=`• ACOS 30% 이하 달성을 위한 키워드 최적화<br>
      • 수익성 없는 키워드/검색어 정리 (네거티브)<br>
      • 오가닉 순위 방어를 위한 최소 광고비 산정`;
  } else if(aiState.mode==="clearance"){
    html+=`• 마이너스 마진 상품, 판매 하락 상품 식별<br>
      • 재고 보관료 vs 광고비 손익 비교<br>
      • 쿠폰/할인 + 공격적 입찰 병행 전략`;
  } else if(aiState.mode==="conquest"){
    html+=`• 경쟁사 브랜드 키워드 & ASIN 타겟 제안<br>
      • 일반 키워드와 다른 ACOS 기준 적용<br>
      • 자사 브랜드 방어 키워드 포함`;
  } else if(aiState.mode==="seasonal"){
    html+=`• 현재 시점 기준 가장 가까운 이벤트 파악<br>
      • 사전 준비 타임라인 (2~4주 전 시작)<br>
      • 이벤트 후 정상화 시점 & 기준`;
  } else if(aiState.mode==="turnaround"){
    html+=`• ACOS 100%+ 키워드 즉시 식별<br>
      • 살릴 키워드 vs 죽일 키워드 명확 구분<br>
      • 광고비 절감 예상 금액 제시`;
  } else {
    html+=`• 신상품과 베스트셀러를 자동 구분하여 전략 제시<br>
      • 제품별 광고 목적에 맞는 KPI 기준 제안<br>
      • 예산 배분 최적화 (런칭 vs 수익)`;
  }
  html+=`</div></div>`;

  // Run button
  const hasData=S.campaign.length>0;
  html+=`<div class="card">`;
  if(!hasData){
    html+=`<div style="text-align:center;padding:8px;font-size:11px;color:var(--mt)">campaign 탭 데이터를 먼저 동기화하세요</div>`;
  }
  html+=`<button onclick="runAi()" ${!hasData||aiState.loading?"disabled":""} style="width:100%;padding:12px;border-radius:10px;border:none;
    background:linear-gradient(135deg,${mode.color},${mode.color}99);
    color:#fff;font-size:13px;font-weight:700;opacity:${!hasData?.5:1}">
    ${aiState.loading?'<span class="spinner"></span>분석 중...':'🤖 '+mode.label+' 분석 실행'}</button></div>`;

  // Result
  if(aiState.result){
    html+=`<div class="card" style="border-color:${mode.color}20">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:12px;font-weight:700;color:${mode.color}">${mode.label} 분석 결과</div>
        <div style="font-size:8px;color:var(--mt)">${aiState.mode.toUpperCase()}</div>
      </div>
      <div style="font-size:11px;color:#CBD5E1;line-height:1.8;white-space:pre-wrap">${aiState.result}</div>
    </div>`;
  }

  el.innerHTML=html;
}

// ── SETTINGS TAB ──
function renderSettings(el){
  let html=`<div class="card">
    <div style="font-size:13px;font-weight:700;margin-bottom:6px">연결 상태</div>
    <div style="font-size:10px;color:#64748B;margin-bottom:8px;word-break:break-all">Sheet ID: ${S.sheetId}</div>`;
  [{n:"campaign",ok:S.sync.campaign},{n:"search_terms",ok:S.sync.search_terms},{n:"business_report",ok:S.sync.business_report}].forEach(s=>{
    const count=s.n==="campaign"?S.campaign.length:s.n==="search_terms"?S.searchTerms.length:S.bizReport.length;
    const dates=s.n==="campaign"?[...new Set(S.campaign.map(r=>r.date))].length:s.n==="search_terms"?[...new Set(S.searchTerms.map(r=>r.date))].length:[...new Set(S.bizReport.map(r=>r.date))].length;
    html+=`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--bd);font-size:10px"><div><b>${s.n}</b> <span style="color:#64748B">${s.ok?count+"행 · "+dates+"일분":"데이터 없음"}</span></div><span class="dot ${s.ok?"ok":"no"}"></span></div>`;
  });
  if(S.lastSync)html+=`<div style="font-size:9px;color:#64748B;margin-top:8px">마지막 동기화: ${S.lastSync}</div>`;
  html+=`</div>`;

  html+=`<div class="card" style="background:rgba(16,185,129,0.03);border-color:rgba(16,185,129,0.1)">
    <div style="font-size:11px;font-weight:700;color:#10B981;margin-bottom:6px">📋 매일 1분 루틴</div>
    <div style="font-size:10px;color:#64748B;line-height:1.8">
    <b>1.</b> 셀러센트럴 → 광고 → 리포트 → 어제 날짜 CSV 다운<br>
    <b>2.</b> 구글시트 campaign 탭 <b>맨 아래</b>에 붙여넣기<br>
    &nbsp;&nbsp;&nbsp;⚠ 기존 데이터 지우지 마세요! 아래에 추가<br>
    <b>3.</b> 대시보드에서 🔄 동기화<br><br>
    <b style="color:var(--tx)">💡 팁:</b> 셀러센트럴에서 CSV 다운 시 Date 컬럼이 없으면<br>
    A열에 날짜(YYYY-MM-DD)를 직접 입력해주세요.
    </div></div>`;

  html+=`<div class="card">
    <div style="font-size:11px;font-weight:700;color:#F59E0B;margin-bottom:6px">⚠ 동기화 안 될 때</div>
    <div style="font-size:10px;color:#64748B;line-height:1.8">
    • 구글시트: <b>파일 → 공유 → 웹에 게시 → 게시</b><br>
    • 탭 이름이 정확히 <b>campaign</b>, <b>search_terms</b>, <b>business_report</b>인지 확인<br>
    • <a href="https://docs.google.com/spreadsheets/d/${S.sheetId}/gviz/tq?tqx=out:csv&sheet=campaign" target="_blank" style="color:#3B82F6">이 링크</a>를 클릭해서 CSV가 보이면 시트 공유 OK</div></div>`;

  el.innerHTML=html;

  const btn=document.createElement("button");btn.textContent="🔌 시트 연결 해제 & 초기화";
  btn.style.cssText="padding:10px;width:100%;border-radius:8px;border:1px solid rgba(239,68,68,0.2);background:transparent;color:#EF4444;font-size:11px;font-weight:600;cursor:pointer";
  btn.onclick=()=>{LS.clear();location.reload()};el.appendChild(btn);
}

function showDashboard(){
  document.getElementById("setup").style.display="none";
  document.getElementById("dashboard").style.display="block";
  renderHeader();renderTabs();renderTab();
}

// ═══ INIT ═══
(function(){
  aiState.result=LS.get("aiResult","");
  aiState.mode=LS.get("aiMode","all");
  const id=LS.get("id","");
  if(id){
    S.sheetId=id;S.campaign=LS.get("c",[]);S.searchTerms=LS.get("s",[]);S.bizReport=LS.get("b",[]);
    S.sync=LS.get("sync",S.sync);S.lastSync=LS.get("last","");
    showDashboard();
    syncAll(id).then(()=>{renderHeader();renderTab()});
  } else {
    document.getElementById("setup").style.display="block";
  }
})();
</script>
